<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉아산병원 안내지도 v15</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/99nBTF5r/1.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/SwCtCF4c/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/nqZHRSS8/3.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/v4kHJDPV/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/MxkY0q1f/3.png">

<style>
  :root {
    --mint:         #009688;
    --mint-light:   #e0f2f1;
    --mint-mid:     #4db6ac;
    --orange:       #ff8c42;
    --orange-light: #fff3eb;
    --orange-mid:   #ffb380;
    --bg:           #f5f7f6;
    --card:         #ffffff;
    --text:         #2c3e35;
    --text-sub:     #6b7c74;
    --border:       #dde8e5;
    --shadow:       0 4px 20px rgba(0,150,136,0.10);
    --radius:       14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px 80px;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .header { text-align: center; margin-bottom: 28px; }
  h1 { color: var(--mint); font-weight: 700; font-size: 22px; letter-spacing: -0.3px; }
  .subtitle { color: var(--text-sub); font-size: 13.5px; margin-top: 2px; }

  /* ── 검색 카드 ── */
  .card {
    max-width: 700px; width: 100%;
    margin: 0 auto 28px auto;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: visible;
  }

  /* ── 탭 ── */
  .tab-bar {
    display: grid; grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 14px 0; font-size: 14px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: transparent; color: var(--text-sub);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    position: relative; top: 1px;
  }
  .tab-btn.active { color: var(--mint); border-bottom: 3px solid var(--mint); }
  .tab-btn:first-child { border-radius: var(--radius) 0 0 0; }
  .tab-btn:last-child  { border-radius: 0 var(--radius) 0 0; }

  .tab-panel { display: none; padding: 22px 20px 20px; }
  .tab-panel.active { display: block; }

  /* ── 입력 필드 ── */
  .field-group { margin-bottom: 16px; }
  .field-label {
    font-size: 13px; font-weight: 600; color: var(--text-sub);
    margin-bottom: 7px; display: flex; align-items: center; gap: 6px;
    text-transform: uppercase; letter-spacing: 0.4px;
  }
  .lbl-icon {
    width: 22px; height: 22px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .lbl-icon.start-icon  { background: #e8f5e9; }
  .lbl-icon.end-icon    { background: var(--orange-light); }
  .lbl-icon.search-icon { background: var(--mint-light); }

  .input-wrap { position: relative; width: 100%; }
  .input-prefix {
    position: absolute; top: 50%; left: 14px;
    transform: translateY(-50%); font-size: 16px;
    pointer-events: none; z-index: 2;
  }
  input[type="text"] {
    width: 100%; padding: 13px 40px 13px 42px;
    border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 15px; font-family: 'Noto Sans KR', sans-serif;
    color: var(--text); background: #fafcfb;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s; outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--mint); background: #fff;
    box-shadow: 0 0 0 3px rgba(0,150,136,0.12);
  }

  .route-divider { display: flex; align-items: center; gap: 10px; margin: 4px 0 16px; }
  .route-divider-line { flex: 1; height: 1px; background: var(--border); }
  .route-arrow {
    width: 28px; height: 28px; background: var(--mint-light);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }

  /* ── 버튼 ── */
  .main-btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .btn-route, .btn-search {
    background: var(--orange); color: #fff;
    box-shadow: 0 4px 14px rgba(255,140,66,0.30);
  }
  .btn-route:hover,  .btn-search:hover  { background: #e67a30; transform: translateY(-1px); }
  .btn-route:active, .btn-search:active { transform: translateY(0); box-shadow: none; }
  .main-btn:disabled {
    background: #c8d8d4 !important; box-shadow: none !important;
    cursor: not-allowed; transform: none !important; opacity: 0.7;
  }

  /* ── X 버튼 ── */
  .clear-btn {
    position: absolute; top: 50%; right: 12px; transform: translateY(-50%);
    background: #c8d8d4; border: none; border-radius: 50%;
    width: 20px; height: 20px; font-size: 11px; color: #fff;
    cursor: pointer; display: none; align-items: center; justify-content: center;
    padding: 0; z-index: 3; transition: background 0.15s;
  }
  .clear-btn:hover { background: #999; }
  .clear-btn.visible { display: flex; }

  /* ── 자동완성 ── */
  .suggest-box {
    display: none; position: absolute; left: 0; right: 0; top: calc(100% + 6px);
    background: #fff; border: 1.5px solid var(--mint-mid); border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,150,136,0.15); padding: 8px; z-index: 100;
  }
  .suggest-header {
    font-size: 11px; font-weight: 700; color: var(--mint);
    padding: 4px 8px 8px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .suggest-list { max-height: 200px; overflow-y: auto; }
  .suggest-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 10px; border-radius: 8px; cursor: pointer; transition: background 0.15s;
  }
  .suggest-item:hover { background: var(--mint-light); }
  .suggest-item b { font-size: 14px; color: var(--text); font-weight: 600; }
  .suggest-floor {
    font-size: 11.5px; color: var(--mint); background: var(--mint-light);
    padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap;
  }

  /* ── 결과 칩 ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp 0.45s cubic-bezier(0.22,0.61,0.36,1) both; }

  .result-chip {
    display: none; max-width: 700px; margin: 0 auto 18px auto;
    background: var(--card); border: 1px solid var(--border);
    border-left: 4px solid var(--mint); border-radius: 10px;
    padding: 14px 16px; box-shadow: var(--shadow);
  }
  .result-chip.orange-accent { border-left-color: var(--orange); }
  .chip-title {
    font-size: 13px; font-weight: 700; color: var(--mint);
    margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
  }
  .orange-accent .chip-title { color: var(--orange); }
  .chip-body { font-size: 13.5px; color: var(--text-sub); line-height: 1.6; white-space: pre-line; }

  /* ── 범례 ── */
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    margin: 0 auto 20px; max-width: 700px; padding: 0 4px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-sub); font-weight: 500; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

  /* ── 지도 컨테이너 ── */
  #mapsContainer { max-width: 700px; width: 100%; margin: 0 auto; display: none; }

  /* ── 지도 탭바 ── */
  .map-tab-bar {
    display: grid; grid-template-columns: 1fr 1fr;
    background: var(--card);
    border-radius: var(--radius) var(--radius) 0 0;
    border: 1px solid var(--border); border-bottom: none;
    overflow: hidden;
  }
  .map-tab-btn {
    padding: 13px 0; font-size: 14px; font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    border: none; background: transparent; color: var(--text-sub);
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, background 0.2s, border-color 0.2s;
    position: relative; top: 1px;
  }
  .map-tab-btn.t-current { color: #2e7d32; border-bottom: 3px solid #4caf50; background: #f1faf2; }
  .map-tab-btn.t-dest    { color: #e65100; border-bottom: 3px solid var(--orange); background: var(--orange-light); }

  /* ── 지도 래퍼 ── */
  .map-wrapper {
    position: relative; width: 100%; display: none;
    overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  /* 탭 없을 때 (단일 지도) */
  .map-wrapper.solo { border-radius: 12px; display: block; }
  /* 탭 있을 때 */
  .map-wrapper.with-tab { border-radius: 0 0 12px 12px; }
  .map-wrapper.with-tab.visible { display: block; }

  .floor-map { width: 100%; height: auto; display: block; cursor: zoom-in; transition: transform 0.2s; }
  .floor-map:hover { transform: scale(1.005); }

  /* ── 마커 ── */
  @keyframes pulse       { 0%{box-shadow:0 0 0 0 rgba(255,140,66,0.5)} 70%{box-shadow:0 0 0 12px rgba(255,140,66,0)} 100%{box-shadow:0 0 0 0 rgba(255,140,66,0)} }
  @keyframes pulseGreen  { 0%{box-shadow:0 0 0 0 rgba(76,175,80,0.5)}  70%{box-shadow:0 0 0 12px rgba(76,175,80,0)}  100%{box-shadow:0 0 0 0 rgba(76,175,80,0)} }
  @keyframes pulseCopper { 0%{box-shadow:0 0 0 0 rgba(184,115,51,0.5)} 70%{box-shadow:0 0 0 10px rgba(184,115,51,0)} 100%{box-shadow:0 0 0 0 rgba(184,115,51,0)} }
  .marker { position: absolute; border-radius: 50%; z-index: 10; transform: translate(-50%,-50%); }
  .marker.start    { width:22px; height:22px; background:#4caf50;        animation:pulseGreen  1.4s infinite; }
  .marker.end      { width:26px; height:26px; background:var(--orange);  animation:pulse       1.4s infinite; }
  .marker.elevator { width:20px; height:20px; background:#b87333;        animation:pulseCopper 1.4s infinite; }

  /* ── 팝업 ── */
  #imagePopup {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 5000;
    align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }
  #popupInner { position: relative; max-width: 95%; max-height: 95%; }
  #popupClose {
    position: absolute; top: -44px; right: -10px;
    background: var(--orange); border: none; color: #fff;
    font-size: 20px; padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
  }
  #popupImgWrap { position: relative; }
  #popupImg { max-width: 100%; max-height: 90vh; border-radius: 12px; display: block; }
  #popupMarker {
    display: none; position: absolute; border-radius: 50%;
    background: var(--orange); width: 26px; height: 26px;
    transform: translate(-50%,-50%); animation: pulse 1.4s infinite; z-index: 5010;
  }

  /* ── 로딩 ── */
  #loadingOverlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 9000; backdrop-filter: blur(3px);
  }
  #loadingBox { background: var(--card); border-radius: 14px; padding: 24px 28px; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
  .spinner { width:36px; height:36px; border:3px solid var(--mint-light); border-top-color:var(--mint); border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingBox p { font-size: 14px; color: var(--text-sub); font-weight: 500; }

  /* ── 경로 SVG ── */
  .path-svg { position:absolute; top:0; left:0; width:100%; height:100%; z-index:5; pointer-events:none; overflow:visible; }
  .path-line-road { fill:none; stroke:#555;            stroke-width:5;   stroke-linecap:round; stroke-linejoin:round; opacity:0.45; }
  .path-line-bg   { fill:none; stroke:#fff;            stroke-width:3.2; stroke-linecap:round; stroke-linejoin:round; opacity:0.6; }
  .path-line      { fill:none; stroke:var(--orange);   stroke-width:2.2; stroke-linecap:round; stroke-linejoin:round; opacity:0.95; }

  /* ── AI 경로 배지 ── */
  .ai-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.3px;
    padding: 3px 9px; border-radius: 20px;
    background: linear-gradient(135deg, #009688, #4db6ac);
    color: #fff; margin-left: 6px; vertical-align: middle;
    box-shadow: 0 2px 6px rgba(0,150,136,0.3);
  }
  .ai-thinking {
    display: none; max-width: 700px; margin: 0 auto 12px auto;
    padding: 10px 16px; background: var(--mint-light);
    border-radius: 10px; border-left: 3px solid var(--mint);
    font-size: 13px; color: var(--mint); font-weight: 500;
    align-items: center; gap: 8px;
  }
  .ai-thinking.show { display: flex; }
  .ai-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--mint); flex-shrink: 0;
    animation: aiPulse 1s ease-in-out infinite;
  }
  @keyframes aiPulse {
    0%,100%{ opacity:1; transform:scale(1); }
    50%    { opacity:0.4; transform:scale(0.7); }
  }

  /* ── 하단 안내 ── */
  .footer-note { text-align:center; padding:28px 20px 0; font-size:14px; line-height:1.8; color:var(--text-sub); max-width:700px; margin:0 auto; }
  .footer-note a { color:var(--mint); text-decoration:none; font-weight:600; }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <h1>강릉아산병원</h1>
  <p class="subtitle">진료과 · 검사실 위치를 안내해 드립니다</p>
</div>

<!-- 검색 카드 -->
<div class="card">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('route')">🧭 경로 안내</button>
    <button class="tab-btn" onclick="switchTab('quick')">🔍 빠른 위치 찾기</button>
  </div>

  <!-- 경로 안내 탭 -->
  <div class="tab-panel active" id="panelRoute">
    <div class="field-group">
      <label class="field-label"><span class="lbl-icon start-icon">🟢</span>출발지</label>
      <div class="input-wrap">
        <span class="input-prefix">📍</span>
        <input id="startInput" type="text" placeholder="예: 신경과, CT실"
          oninput="showSuggestions('start'); toggleClear('startInput','clearStart')"
          autocomplete="off" onkeydown="handleStartEnter(event)">
        <button class="clear-btn" id="clearStart"
          onclick="clearInput('startInput','clearStart','start')" tabindex="-1">✕</button>
        <div id="startSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="startSuggestList"></div>
        </div>
      </div>
    </div>

    <div class="route-divider">
      <div class="route-divider-line"></div>
      <div class="route-arrow">↓</div>
      <div class="route-divider-line"></div>
    </div>

    <div class="field-group">
      <label class="field-label"><span class="lbl-icon end-icon">🟠</span>도착지</label>
      <div class="input-wrap">
        <span class="input-prefix">🏁</span>
        <input id="endInput" type="text" placeholder="예: MRI실, 심장내과"
          oninput="showSuggestions('end'); toggleClear('endInput','clearEnd'); updateBtnState()"
          autocomplete="off" onkeydown="if(event.key==='Enter') navigateRoute()">
        <button class="clear-btn" id="clearEnd"
          onclick="clearInput('endInput','clearEnd','end'); updateBtnState()" tabindex="-1">✕</button>
        <div id="endSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="endSuggestList"></div>
        </div>
      </div>
    </div>

    <button id="btnRoute" class="main-btn btn-route" onclick="navigateRoute()" disabled>
      🧭 경로 안내
    </button>
  </div>

  <!-- 빠른 위치 찾기 탭 -->
  <div class="tab-panel" id="panelQuick">
    <div class="field-group">
      <label class="field-label"><span class="lbl-icon search-icon">🔍</span>찾을 장소</label>
      <div class="input-wrap">
        <span class="input-prefix">🏥</span>
        <input id="searchInput" type="text" placeholder="예: 내분비내과, 초음파검사실"
          oninput="showSuggestions('search'); toggleClear('searchInput','clearSearch'); updateSearchBtnState()"
          autocomplete="off" onkeydown="if(event.key==='Enter') searchPlace()">
        <button class="clear-btn" id="clearSearch"
          onclick="clearInput('searchInput','clearSearch','search'); updateSearchBtnState()" tabindex="-1">✕</button>
        <div id="searchSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="searchSuggestList"></div>
        </div>
      </div>
    </div>
    <button id="btnSearch" class="main-btn btn-search" onclick="searchPlace()" disabled>
      🔍 위치 표시
    </button>
  </div>
</div>

<!-- 결과 칩 -->
<div id="resultChip" class="result-chip">
  <div class="chip-title" id="chipTitle">📍 위치 안내</div>
  <div class="chip-body"  id="chipBody"></div>
</div>

<!-- 범례 -->
<div id="legendBox" class="legend" style="display:none;">
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50;"></div>출발지</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange);"></div>도착지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b87333;"></div>엘리베이터</div>
</div>

<!-- 지도 영역 -->
<div id="mapsContainer">
  <!-- 지도 탭 (다른 층일 때만 노출) -->
  <div id="mapTabBar" class="map-tab-bar" style="display:none;">
    <button class="map-tab-btn t-current" id="tabBtnCurrent" onclick="switchMapTab('current')">🟢 출발층</button>
    <button class="map-tab-btn"           id="tabBtnDest"    onclick="switchMapTab('dest')">🟠 도착층</button>
  </div>
  <!-- 출발층 지도 -->
  <div id="mapCurrent" class="map-wrapper">
    <img id="mapImageCurrent" class="floor-map" src="" alt="출발층 지도"
      loading="lazy" onclick="openImagePopup(this.src,'start')">
  </div>
  <!-- 도착층 지도 -->
  <div id="mapDestination" class="map-wrapper">
    <img id="mapImageDestination" class="floor-map" src="" alt="도착층 지도"
      loading="lazy" onclick="openImagePopup(this.src,'end')">
  </div>
</div>

<!-- 확대 팝업 -->
<div id="imagePopup" style="display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.88); z-index:5000; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);">
  <div id="popupInner" style="position:relative; max-width:95%; max-height:95%;">
    <button id="popupClose" onclick="closeImagePopup()"
      style="position:absolute; top:-44px; right:-10px; background:var(--orange);
      border:none; color:#fff; font-size:20px; padding:8px 14px; border-radius:8px;
      cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:700;">✕ 닫기</button>
    <div id="popupImgWrap" style="position:relative; max-width:100%;">
      <img id="popupImg" src="" style="max-width:100%; max-height:90vh; border-radius:12px; display:block;">
      <div id="popupMarker" style="display:none; position:absolute; border-radius:50%;
        background:var(--orange); width:26px; height:26px; transform:translate(-50%,-50%);
        animation:pulse 1.4s infinite; z-index:5010;"></div>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div id="loadingOverlay">
  <div id="loadingBox">
    <div class="spinner"></div>
    <p>지도를 불러오는 중입니다…</p>
  </div>
</div>

<!-- 하단 안내 -->
<div class="footer-note">
  <p>😊 병원 안내 정보가 도움이 되셨나요?</p>
  <p>수정이 필요하거나 보완할 부분이 있다면<br>

/* ══════════════════════════════════════
   유틸
══════════════════════════════════════ */
function norm(str) { return str.toLowerCase().replace(/\s+/g,''); }

function resolveKey(raw) {
  if (!raw) return null;
  const low = raw.trim().toLowerCase();
  const ali = aliases[low] || low;
  return Object.keys(positions).find(k => k.toLowerCase().includes(ali)) || null;
}

function hideResults() {
  mapsContainer.style.display = 'none';
  mapTabBar.style.display = 'none';
  mapCurrentWrap.className = 'map-wrapper';
  mapDestWrap.className    = 'map-wrapper';
  resultChip.style.display = 'none';
  legendBox.style.display  = 'none';
}

/* ══════════════════════════════════════
   자동완성
══════════════════════════════════════ */
function getSuggestions(query) {
  if (!query) return [];
  const q = norm(query);
  const am = [];
  Object.keys(aliases).forEach(k => {
    if (norm(k).includes(q) && positions[aliases[k]]) am.push(aliases[k]);
  });
  const dm = Object.keys(positions).filter(k => norm(k).includes(q));
  return [...new Set([...am,...dm])].slice(0,6).map(n => ({name:n, floor:positions[n].floor}));
}

const preloadedFloors = new Set();
function preloadFloor(f) {
  if (preloadedFloors.has(f) || !maps[f]) return;
  preloadedFloors.add(f); new Image().src = maps[f];
}

function fillSuggestions(listEl, boxEl, sugs, targetInput) {
  listEl.innerHTML = '';
  if (!sugs.length) { boxEl.style.display = 'none'; return; }
  sugs.forEach(s => {
    const div = document.createElement('div');
    div.className = 'suggest-item';
    div.innerHTML = `<b>${s.name}</b><span class="suggest-floor">${s.floor}</span>`;
    div.addEventListener('mouseenter', () => preloadFloor(s.floor));
    div.addEventListener('touchstart', () => preloadFloor(s.floor), {passive:true});
    div.onclick = () => {
      targetInput.value = s.name;
      boxEl.style.display = 'none';
      if (targetInput === searchInput) searchPlace();
      else if (targetInput === endInput) navigateRoute();
      else if (targetInput === startInput && endInput.value.trim()) navigateRoute();
    };
    listEl.appendChild(div);
  });
  boxEl.style.display = 'block';
}

function showSuggestions(type) {
  if (type==='start')  fillSuggestions(startSuggestList,  startSuggestBox,  getSuggestions(startInput.value),  startInput);
  if (type==='end')    fillSuggestions(endSuggestList,    endSuggestBox,    getSuggestions(endInput.value),    endInput);
  if (type==='search') fillSuggestions(searchSuggestList, searchSuggestBox, getSuggestions(searchInput.value), searchInput);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#startSuggest')  && !e.target.closest('#startInput'))  startSuggestBox.style.display  = 'none';
  if (!e.target.closest('#endSuggest')    && !e.target.closest('#endInput'))    endSuggestBox.style.display    = 'none';
  if (!e.target.closest('#searchSuggest') && !e.target.closest('#searchInput')) searchSuggestBox.style.display = 'none';
});

══════════════════════════════════════ */
function handleStartEnter(e) {
  if (e.key==='Enter') { e.preventDefault(); endInput.focus(); }
}
function toggleClear(inputId, btnId) {
  const v = document.getElementById(inputId).value.trim();
  const b = document.getElementById(btnId);
  if (b) v ? b.classList.add('visible') : b.classList.remove('visible');
}
function clearInput(inputId, btnId, sugType) {
  const el = document.getElementById(inputId);
  el.value = '';
  toggleClear(inputId, btnId);
  showSuggestions(sugType);
  el.focus();
}
function updateBtnState()       { const b=document.getElementById('btnRoute');  if(b) b.disabled=!endInput.value.trim(); }
function updateSearchBtnState() { const b=document.getElementById('btnSearch'); if(b) b.disabled=!searchInput.value.trim(); }

/* ══════════════════════════════════════
   마커 / 지도 세팅
══════════════════════════════════════ */
function addMarker(wrapper, cls, top, left) {
  const m = document.createElement('div');
  m.className = 'marker ' + cls;
  m.style.top = top; m.style.left = left;
  wrapper.appendChild(m);
}
function setupMap(wrapper, imgEl, floorName) {
  wrapper.querySelectorAll('.marker,.path-svg').forEach(n => n.remove());
  imgEl.src = maps[floorName];
  imgEl.dataset.floorName = floorName;
}

/* ══════════════════════════════════════
   로딩 / 페이드
══════════════════════════════════════ */
function showLoading() { loadingOverlay.style.display = 'flex'; }
function hideLoading()  { loadingOverlay.style.display = 'none'; }
function waitImagesLoaded(imgs, cb) {
  let n = imgs.filter(i=>i&&i.src).length || 1;
  const done = () => { if (--n<=0) cb(); };
  imgs.forEach(img => { if (!img||!img.src) return; img.complete ? done() : (img.onload=img.onerror=done); });
}
function triggerFadeIn(el) { el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }

function scrollToResult() {
  setTimeout(() => resultChip.scrollIntoView({behavior:'smooth',block:'start'}), 120);
}
function showResult(title, body, isOrange) {
  chipTitle.textContent = title;
  chipBody.textContent  = body;
  resultChip.className  = 'result-chip' + (isOrange?' orange-accent':'') + ' fade-in';
  resultChip.style.display = 'block';
  triggerFadeIn(resultChip);
  scrollToResult();
}

/* ══════════════════════════════════════
   빠른 위치 찾기
══════════════════════════════════════ */
function searchPlace() {
  const raw = searchInput.value.trim();
  if (!raw) { showResult('⚠️ 안내','검색어를 입력해주세요.',false); mapsContainer.style.display='none'; legendBox.style.display='none'; return; }
  const key = resolveKey(raw);
  if (!key)  { showResult('⚠️ 검색 결과 없음','일치하는 장소를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.',false); mapsContainer.style.display='none'; legendBox.style.display='none'; return; }

  const dst = positions[key];
  showLoading();
  mapsContainer.style.display = 'block';
  setupMap(mapDestWrap, mapImageDest, dst.floor);
  addMarker(mapDestWrap, 'end', dst.top, dst.left);
  showSingleMap('dest');
  showResult(`📍 ${dst.floor} · ${key}`, `주황색 점이 도착지 위치예요.\n지도를 탭하면 크게 볼 수 있어요 🔎`, true);
  legendBox.style.display = 'flex';
  waitImagesLoaded([mapImageDest], () => { hideLoading(); triggerFadeIn(mapsContainer); });
}

/* ══════════════════════════════════════
   경로 안내
══════════════════════════════════════ */
function navigateRoute() {
  const sVal = startInput.value.trim();
  const eVal = endInput.value.trim();
  if (!eVal) { showResult('⚠️ 안내','도착지를 입력해주세요.',false); mapsContainer.style.display='none'; legendBox.style.display='none'; return; }

  const startKey = resolveKey(sVal);
  const endKey   = resolveKey(eVal);
  if (!endKey) { showResult('⚠️ 검색 결과 없음','도착지를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.',false); mapsContainer.style.display='none'; legendBox.style.display='none'; return; }

  const src      = startKey ? positions[startKey] : null;
  const dst      = positions[endKey];
  const srcFloor = src ? src.floor : null;
  const dstFloor = dst.floor;

  showLoading();
  mapsContainer.style.display = 'block';

  const currentFloor = srcFloor || dstFloor;
  setupMap(mapCurrentWrap, mapImageCurrent, currentFloor);
  setupMap(mapDestWrap,    mapImageDest,    dstFloor);

  const sameFloor    = srcFloor && srcFloor === dstFloor;
  const srcBuilding  = srcFloor ? (srcFloor.includes('본관') ? '본관' : '신관') : null;
  const dstBuilding  = dstFloor.includes('본관') ? '본관' : '신관';
  const sameBuilding = srcBuilding && srcBuilding === dstBuilding;

  let title = src ? `🧭 ${startKey} → ${endKey}` : `📍 ${endKey}`;
  let body  = '';

  if (!src) {
    body = `${dstFloor}에 위치해 있어요.\n주황색 점이 도착지예요. 지도를 탭하면 크게 볼 수 있어요 🔎`;
  } else if (sameFloor) {
    body = `같은 층이에요! 바로 이동하시면 됩니다 🙂\n초록색 → 출발지 / 주황색 → 도착지`;
  } else if (sameBuilding) {
    body = `같은 건물이지만 층이 달라요.\n${srcFloor} 엘리베이터(갈색 점)를 타고 ${dstFloor}으로 이동해주세요 🚪`;
  } else {
    const bridgeLv = (srcFloor && (srcFloor.includes('3층') || dstFloor.includes('3층'))) ? '3층' : '2층';
    body = `건물이 달라요.\n본관 ↔ 신관 ${bridgeLv} 연결통로를 이용해 이동하세요 🚶`;
  }

  showResult(title, body, false);
  legendBox.style.display = 'flex';

  /* ── 지도 표시 모드 결정 ── */
  if (!src) {
    /* 도착지만 → 지도 1개 */
    showSingleMap('dest');
    addMarker(mapDestWrap, 'end', dst.top, dst.left);
  } else if (sameFloor) {
    /* 같은 층 → current 지도 하나에 출발+도착 마커 */
    addMarker(mapCurrentWrap, 'start', src.top, src.left);
    addMarker(mapCurrentWrap, 'end',   dst.top, dst.left);
    showSingleMap('current');
  } else {
    /* 다른 층 → 탭 전환 */
    addMarker(mapCurrentWrap, 'start', src.top, src.left);
    const elev = elevators[currentFloor];
    if (elev) addMarker(mapCurrentWrap, 'elevator', elev.top, elev.left);
    addMarker(mapDestWrap, 'end', dst.top, dst.left);
    showTabMap('current');
  }

  waitImagesLoaded([mapImageCurrent, mapImageDest], async () => {
    hideLoading();
    triggerFadeIn(mapsContainer);
    renderPaths(src, dst, currentFloor, dstFloor, sameFloor);
  });
}

let adminMode = false;
document.addEventListener('keydown', e => { if (e.altKey && e.key==='m') toggleAdminMode(); });
function toggleAdminMode() {
  if (!adminMode) {
    if (prompt('관리자 비밀번호:') !== 'gnah2025') { alert('비밀번호가 올바르지 않습니다.'); return; }
    adminMode = true;
    alert('🛠️ 관리자 모드 활성화\n도착층 지도를 클릭하면 좌표를 얻을 수 있습니다.');
    mapDestWrap.addEventListener('click', handleAdminClick);
  } else {
    adminMode = false;
    alert('관리자 모드 종료');
    mapDestWrap.removeEventListener('click', handleAdminClick);
  }
}
function handleAdminClick(e) {
  if (!adminMode) return;
  const rect = mapImageDest.getBoundingClientRect();
  const x = ((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const y = ((e.clientY-rect.top)/rect.height*100).toFixed(1);
  const floor = mapImageDest.dataset.floorName || '';
  const label = prompt(`이름 입력\n좌표: top:${y}%, left:${x}%\n층: ${floor}`);
  if (!label) return;
  positions[label] = {floor, top:y+'%', left:x+'%'};
  alert(`${floor} ${label} 추가 완료!`);
}

/* BFS */
function findCorridorPath(floorName, startPct, endPct) {
  const g = corridorGraph[floorName];
  if (!g) return [startPct, endPct];
  const nodes = g.nodes;
  function nearest(p) {
    let best=null, minD=Infinity;
    Object.entries(nodes).forEach(([id,n]) => {
      const d = Math.sqrt((p.x-n.x)**2+(p.y-n.y)**2);
      if (d<minD) { minD=d; best=id; }
    });
    return best;
  }
  const sId = nearest(startPct), eId = nearest(endPct);
  if (!sId||!eId) return [startPct,endPct];
  if (sId===eId) return [startPct,{x:nodes[sId].x,y:nodes[sId].y},endPct];
  const adj={};
  Object.keys(nodes).forEach(id=>adj[id]=[]);
  g.edges.forEach(([a,b])=>{adj[a].push(b);adj[b].push(a);});
  const vis={[sId]:null}, q=[sId]; let found=false;
  while(q.length&&!found){
    const cur=q.shift();
    if(cur===eId){found=true;break;}
    (adj[cur]||[]).forEach(nb=>{if(!(nb in vis)){vis[nb]=cur;q.push(nb);}});
  }
  if(!found&&!(eId in vis)) return [startPct,endPct];
  const ids=[]; let cur=eId;
  while(cur!==null){ids.unshift(cur);cur=vis[cur];}
  return [startPct,...ids.map(id=>({x:nodes[id].x,y:nodes[id].y})),endPct];
}

/* ══════════════════════════════════════
   경로 그리기
══════════════════════════════════════ */
function drawPathOnMap(wrapper, startPct, endPct, floorName, delay) {
  wrapper.querySelectorAll('.path-svg').forEach(s => s.remove());
  const pts = findCorridorPath(floorName, startPct, endPct);
  if (!pts || pts.length < 2) return;

  let len = 0;
  for (let i = 1; i < pts.length; i++)
    len += Math.sqrt((pts[i].x-pts[i-1].x)**2 + (pts[i].y-pts[i-1].y)**2);

  const ps = pts.map(p => `${(+p.x).toFixed(2)},${(+p.y).toFixed(2)}`).join(' ');
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('path-svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');

  const road = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  road.setAttribute('points', ps); road.setAttribute('class','path-line-road');

  const bg = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  bg.setAttribute('points', ps); bg.setAttribute('class','path-line-bg');

  const line = document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points', ps); line.setAttribute('class','path-line');
  line.style.strokeDasharray  = len;
  line.style.strokeDashoffset = len;
  line.style.transition = `stroke-dashoffset 1.4s ease ${delay||0}s`;

  svg.appendChild(road); svg.appendChild(bg); svg.appendChild(line);
  wrapper.appendChild(svg);
  requestAnimationFrame(() => requestAnimationFrame(() => { line.style.strokeDashoffset = '0'; }));
}

function posToPct(pos) { return {x: parseFloat(pos.left), y: parseFloat(pos.top)}; }

/* 본관↔신관 연결통로 */
const connectorPos = {
  '본관 2층':{x:97,y:47}, '신관 2층':{x:2,y:43},
  '본관 3층':{x:97,y:47}, '신관 3층':{x:2,y:44}
};
function getBridgeFloor(srcFloor, dstFloor) {
  if (srcFloor.includes('본관') === dstFloor.includes('본관')) return null;
  return (srcFloor.includes('3층') || dstFloor.includes('3층')) ? '3층' : '2층';
}

function renderPaths(src, dst, srcFloor, dstFloor, sameFloor) {
  const dstPct = posToPct(dst);

  if (!src) {
    const e = elevators[dstFloor];
    if (e) drawPathOnMap(mapDestWrap, posToPct(e), dstPct, dstFloor, 0.3);
    return;
  }

  const srcPct       = posToPct(src);
  const srcBuilding  = srcFloor.includes('본관') ? '본관' : '신관';
  const dstBuilding  = dstFloor.includes('본관') ? '본관' : '신관';
  const diffBuilding = srcBuilding !== dstBuilding;
  const elevSrc = elevators[srcFloor];
  const elevDst = elevators[dstFloor];

  if (sameFloor) {
    drawPathOnMap(mapCurrentWrap, srcPct, dstPct, srcFloor, 0.3);
  } else if (!diffBuilding) {
    if (elevSrc) drawPathOnMap(mapCurrentWrap, srcPct, posToPct(elevSrc), srcFloor, 0.3);
    if (elevDst) drawPathOnMap(mapDestWrap, posToPct(elevDst), dstPct, dstFloor, 0.5);
  } else {
    const bl  = getBridgeFloor(srcFloor, dstFloor);
    const sbk = srcBuilding + ' ' + bl;
    const dbk = dstBuilding + ' ' + bl;
    const sc  = connectorPos[sbk];
    const dc  = connectorPos[dbk];
    if (srcFloor === sbk) { if (sc) drawPathOnMap(mapCurrentWrap, srcPct, sc, srcFloor, 0.3); }
    else { if (elevSrc) drawPathOnMap(mapCurrentWrap, srcPct, posToPct(elevSrc), srcFloor, 0.3); }
    if (dstFloor === dbk) { if (dc) drawPathOnMap(mapDestWrap, dc, dstPct, dstFloor, 0.5); }
    else { if (elevDst) drawPathOnMap(mapDestWrap, posToPct(elevDst), dstPct, dstFloor, 0.5); }
  }
}
