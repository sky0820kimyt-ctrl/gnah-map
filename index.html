<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉아산병원 안내지도 v51</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/99nBTF5r/1.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/SwCtCF4c/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/nqZHRSS8/3.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/v4kHJDPV/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/MxkY0q1f/3.png">
<style>
  :root {
    --mint:#009688; --mint-light:#e0f2f1; --mint-mid:#4db6ac;
    --orange:#e8620a; --orange-light:#fff0e6;
    /* 어르신 배려: 배경 밝게, 텍스트 진하게 */
    --bg:#f0f4f2; --card:#ffffff; --text:#1a2e25; --text-sub:#3d5247;
    --border:#b8d0c8; --shadow:0 4px 20px rgba(0,150,136,0.12); --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  /* 어르신: 기본 폰트 크기 크게, 줄간격 넓게 */
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
    padding:24px 14px 80px;min-height:100vh;font-size:17px;line-height:1.7;}

  /* 헤더 */
  .header{text-align:center;margin-bottom:24px;}
  h1{color:var(--mint);font-weight:900;font-size:26px;letter-spacing:-0.3px;}
  .subtitle{color:var(--text-sub);font-size:16px;margin-top:4px;font-weight:600;}

  /* 카드 */
  .card{max-width:700px;width:100%;margin:0 auto 24px;background:var(--card);
    border-radius:var(--radius);box-shadow:var(--shadow);border:2px solid var(--border);overflow:visible;}

  /* 탭 */
  .tab-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid var(--border);}
  .tab-btn{padding:16px 0;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;
    border:none;background:transparent;color:var(--text-sub);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    border-bottom:4px solid transparent;transition:color .2s,border-color .2s;position:relative;top:2px;}
  .tab-btn.active{color:var(--mint);border-bottom:4px solid var(--mint);}
  .tab-btn:first-child{border-radius:var(--radius) 0 0 0;}
  .tab-btn:last-child{border-radius:0 var(--radius) 0 0;}
  .tab-panel{display:none;padding:20px 18px 18px;}
  .tab-panel.active{display:block;}

  /* 입력 */
  .field-group{margin-bottom:18px;}
  .field-label{font-size:15px;font-weight:800;color:var(--text);margin-bottom:8px;
    display:flex;align-items:center;gap:6px;letter-spacing:.2px;}
  .lbl-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .lbl-icon.start-icon{background:#d4edda;} .lbl-icon.end-icon{background:var(--orange-light);} .lbl-icon.search-icon{background:var(--mint-light);}
  .input-wrap{position:relative;width:100%;}
  .input-prefix{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:20px;pointer-events:none;z-index:2;}
  /* 어르신: 입력창 크고 뚜렷하게 */
  input[type="text"]{width:100%;padding:16px 44px 16px 48px;
    border:2.5px solid var(--border);border-radius:12px;
    font-size:18px;font-weight:700;font-family:'Noto Sans KR',sans-serif;
    color:var(--text);background:#fff;
    transition:border-color .2s,box-shadow .2s;outline:none;}
  input[type="text"]:focus{border-color:var(--mint);background:#fff;
    box-shadow:0 0 0 4px rgba(0,150,136,0.15);}
  input[type="text"]::placeholder{color:#a0b8b0;font-weight:500;}
  .route-divider{display:flex;align-items:center;gap:10px;margin:4px 0 18px;}
  .route-divider-line{flex:1;height:2px;background:var(--border);}
  .route-arrow{width:32px;height:32px;background:var(--mint-light);border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;font-weight:900;}

  /* 버튼 — 크고 굵고 터치하기 쉽게 */
  .main-btn{width:100%;padding:18px;border:none;border-radius:14px;
    font-size:18px;font-weight:900;font-family:'Noto Sans KR',sans-serif;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform .15s,box-shadow .15s,background .15s;min-height:60px;}
  .btn-route,.btn-search{background:var(--orange);color:#fff;
    box-shadow:0 5px 18px rgba(232,98,10,.35);}
  .btn-route:hover,.btn-search:hover{background:#c8520a;transform:translateY(-1px);}
  .btn-route:active,.btn-search:active{transform:translateY(0);box-shadow:none;}
  .main-btn:disabled{background:#b0c8c0!important;box-shadow:none!important;
    cursor:not-allowed;transform:none!important;color:#fff;}

  /* X 버튼 — 크게 */
  .clear-btn{position:absolute;top:50%;right:12px;transform:translateY(-50%);
    background:#8aada4;border:none;border-radius:50%;
    width:28px;height:28px;font-size:14px;color:#fff;cursor:pointer;
    display:none;align-items:center;justify-content:center;padding:0;z-index:3;}
  .clear-btn:hover{background:#5a8a80;} .clear-btn.visible{display:flex;}

  /* 자동완성 — 글씨 크게 */
  .suggest-box{display:none;position:absolute;left:0;right:0;top:calc(100% + 8px);
    background:#fff;border:2px solid var(--mint-mid);border-radius:14px;
    box-shadow:0 8px 24px rgba(0,150,136,.18);padding:8px;z-index:100;}
  .suggest-header{font-size:13px;font-weight:800;color:var(--mint);padding:4px 8px 8px;letter-spacing:.3px;}
  .suggest-list{max-height:240px;overflow-y:auto;}
  .suggest-item{display:flex;justify-content:space-between;align-items:center;
    padding:12px 12px;border-radius:10px;cursor:pointer;transition:background .15s;
    border-bottom:1px solid #eef4f2;}
  .suggest-item:last-child{border-bottom:none;}
  .suggest-item:hover,.suggest-item:active{background:var(--mint-light);}
  .suggest-item b{font-size:17px;color:var(--text);font-weight:800;}
  .suggest-floor{font-size:13px;color:var(--mint);background:var(--mint-light);
    padding:3px 10px;border-radius:20px;font-weight:700;white-space:nowrap;}

  /* 결과 칩 */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeInUp .4s cubic-bezier(.22,.61,.36,1) both;}
  .result-chip{display:none;max-width:700px;margin:0 auto 20px;background:var(--card);
    border:2px solid var(--border);border-left:5px solid var(--mint);
    border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);}
  .result-chip.orange-accent{border-left-color:var(--orange);}
  .chip-title{font-size:16px;font-weight:900;color:var(--mint);margin-bottom:6px;}
  .orange-accent .chip-title{color:var(--orange);}
  .chip-body{font-size:16px;color:var(--text-sub);line-height:1.8;white-space:pre-line;font-weight:600;}
  .chip-body strong{font-size:18px;color:var(--text);font-weight:900;display:block;margin-top:6px;}

  /* 범례 — 글씨 크게, 간격 넓게 */
  .legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;
    margin:0 auto 20px;max-width:700px;padding:4px 4px;}
  .legend-item{display:flex;align-items:center;gap:7px;
    font-size:14px;color:var(--text);font-weight:700;}
  .legend-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}

  /* 지도 컨테이너 */
  #mapsContainer{max-width:700px;width:100%;margin:0 auto;display:none;}

  /* ── 경로 요약 바 ── */
  .route-summary {
    max-width:700px; margin:0 auto 16px; padding:14px 16px;
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; box-shadow:var(--shadow);
    display:flex; flex-wrap:wrap; align-items:center; gap:6px;
  }
  .route-summary-item {
    display:flex; align-items:center; gap:5px;
    font-size:13px; font-weight:600; color:var(--text);
    background:var(--bg); border-radius:20px;
    padding:5px 10px; border:1px solid var(--border);
  }
  .route-summary-item .rs-floor { font-size:11px; color:var(--text-sub); font-weight:400; }
  .route-summary-arrow {
    font-size:12px; color:var(--text-sub); padding:0 2px; flex-shrink:0;
  }
  .rs-transport {
    display:inline-flex; align-items:center; gap:4px;
    font-size:11.5px; color:#fff; font-weight:700;
    padding:3px 8px; border-radius:20px; margin:0 2px;
  }
  .rs-transport.elev  { background:#a0714f; }
  .rs-transport.conn  { background:#7c3aed; }
  .rs-transport.walk  { background:#43a047; }

  /* ── 진행 단계 바 ── */
  .progress-bar {
    max-width:700px; margin:0 auto 20px;
    display:flex; align-items:center; padding:0 4px;
  }
  .pb-step {
    display:flex; flex-direction:column; align-items:center;
    gap:5px; flex:0 0 auto; cursor:pointer;
  }
  .pb-circle {
    width:40px; height:40px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:900;
    border:3px solid transparent;
    transition:all .25s;
  }
  .pb-circle.inactive  { background:#f0f4f3; border-color:var(--border); color:var(--text-sub); }
  .pb-circle.active    { background:var(--mint); border-color:var(--mint); color:#fff; box-shadow:0 0 0 4px rgba(0,150,136,.18); }
  .pb-circle.done      { background:#c8e6c9; border-color:#81c784; color:#2e7d32; }
  .pb-label {
    font-size:12px; font-weight:700; color:var(--text-sub);
    text-align:center; max-width:70px; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .pb-label.active { color:var(--mint); font-weight:900; }
  .pb-line {
    flex:1; height:3px; margin:0 4px; margin-bottom:22px;
    background:var(--border); border-radius:2px; transition:background .3s;
  }
  .pb-line.done { background:var(--mint); }

  /* ── 단계 카드 ── */
  .step-block { margin-bottom:8px; display:none; }
  .step-block.active-step { display:block; }
  .step-block.always-show { display:block; }

  /* 현재 층 강조 헤딩 — 어르신: 크고 뚜렷하게 */
  .step-heading{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:14px 18px;border-radius:12px;font-size:18px;font-weight:900;letter-spacing:-0.3px;}
  .step-num{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
  .step-heading.type-start{background:#e8f5e9;color:#1b5e20;} .step-heading.type-start .step-num{background:#2e7d32;color:#fff;}
  .step-heading.type-mid{background:var(--mint-light);color:#004d40;} .step-heading.type-mid .step-num{background:var(--mint);color:#fff;}
  .step-heading.type-end{background:var(--orange-light);color:#bf360c;} .step-heading.type-end .step-num{background:#e64a19;color:#fff;}
  /* 출발/도착 레이블 배지 */
  .step-role-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:auto;flex-shrink:0;}
  .type-start .step-role-badge{background:#2e7d32;color:#fff;}
  .type-end   .step-role-badge{background:#e64a19;color:#fff;}
  .type-mid   .step-role-badge{background:var(--mint);color:#fff;}

  /* ── 지금 할 일 액션 박스 (지도 위) ── */
  .action-box {
    border-radius:12px 12px 0 0;
    padding:14px 16px 12px;
    margin-bottom:0;
    border-bottom:none;
  }
  .action-box.elev { background:#3e1f00; }
  .action-box.esc  { background:#3e2800; }  /* 에스컬레이터 구분 */
  .action-box.conn { background:#2d1457; }
  .action-box.end  { background:#7a2e00; }
  .action-box.walk { background:#1b3a1e; }

  .action-label {
    font-size:11px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; opacity:0.7; margin-bottom:6px;
  }
  .action-label.elev { color:#ffcc80; }
  .action-label.conn { color:#ce93d8; }
  .action-label.end  { color:#ffb74d; }
  .action-label.walk { color:#a5d6a7; }

  .action-main {
    font-size:24px; font-weight:900; line-height:1.25; letter-spacing:-0.5px;
  }
  .action-main.elev { color:#fff3e0; }
  .action-main.conn { color:#f3e5f5; }
  .action-main.end  { color:#fff8e1; }
  .action-main.walk { color:#e8f5e9; }

  .action-sub {
    font-size:15px; margin-top:6px; opacity:0.85; font-weight:600;
  }
  .action-sub.elev { color:#ffe0b2; }
  .action-sub.conn { color:#e1bee7; }
  .action-sub.end  { color:#ffe0b2; }
  .action-sub.walk { color:#c8e6c9; }

  /* 액션박스가 있으면 지도 모서리 위쪽 제거 */
  .action-box + .map-wrapper { border-radius:0 0 12px 12px; }

  /* ── 다음 목적지 callout (지도 아래, 다음단계 있을 때) ── */
  .dest-callout {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; margin-top:0;
    background:var(--card); border:1px solid var(--border);
    border-top:none; border-radius:0 0 12px 12px;
    margin-bottom:12px;
  }
  .dest-callout-icon {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .dest-callout-icon.elev { background:#fdf3e3; }
  .dest-callout-icon.conn { background:#ede9fe; }
  .dest-callout-body { flex:1; }
  .dest-callout-small {
    font-size:11px; color:var(--text-sub); font-weight:600;
    letter-spacing:0.3px; margin-bottom:2px;
  }
  .dest-callout-floor {
    font-size:17px; font-weight:900; letter-spacing:-0.3px;
  }
  .dest-callout-floor.elev { color:#a0714f; }
  .dest-callout-floor.conn { color:#7c3aed; }

  /* ── 다음 단계 버튼 ── */
  .next-btn {
    width:100%; margin-top:12px; padding:18px;
    background:var(--mint); color:#fff;
    border:none; border-radius:14px;
    font-size:18px; font-weight:900; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    transition:background .15s, transform .15s;
    min-height:60px;
    box-shadow: 0 5px 18px rgba(0,150,136,0.38);
  }
  .next-btn:hover { background:#00796b; transform:translateY(-1px); }
  /* 이전 단계 버튼 — 더 잘 보이게 */
  .prev-btn {
    width:100%; margin-top:8px; padding:15px;
    background:#f0f4f2; color:var(--text);
    border:2px solid var(--border); border-radius:12px;
    font-size:16px; font-weight:800; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; transition:all .15s; min-height:54px;
    display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .prev-btn:hover { border-color:var(--mint); color:var(--mint); background:#e0f2f1; }
  /* 점선 유도선 애니메이션 (경로선 위에 흐르는 점) */
  @keyframes dashFlow {
    to { stroke-dashoffset: -20; }
  }
  .path-dash {
    fill:none; stroke:#fff; stroke-width:1.0;
    stroke-dasharray: 3 7;
    stroke-linecap: round;
    animation: dashFlow 0.8s linear infinite;
    opacity: 0.7;
  }

  /* 기존 호환용 */
  .step-desc{font-size:12.5px;color:var(--text-sub);margin-bottom:10px;padding:0 4px;line-height:1.6;}
  .transport-badge-wrap { display:none; }

  /* ── 단계 인지 헤더 (고정 바) ── */
  #stepNavBar {
    display:none; max-width:700px; margin:0 auto 12px;
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; box-shadow:var(--shadow);
    overflow:hidden;
  }
  #stepNavBar.visible { display:block; }
  .snb-top {
    background:var(--mint); color:#fff;
    padding:10px 16px; display:flex; align-items:center; gap:8px;
    font-size:15px; font-weight:800;
  }
  .snb-counter {
    margin-left:auto; background:rgba(255,255,255,0.3);
    border-radius:20px; padding:3px 12px; font-size:14px; font-weight:800;
  }
  .snb-route {
    padding:12px 16px; display:flex; align-items:center; gap:8px;
    font-size:17px; font-weight:900; flex-wrap:wrap;
  }
  .snb-loc {
    background:var(--bg); border-radius:24px;
    padding:6px 16px; font-size:16px; font-weight:900;
  }
  .snb-loc.current { border:3px solid var(--mint); color:var(--mint); }
  .snb-loc.next    { border:3px solid var(--orange); color:#c8520a; }
  .snb-arrow { color:var(--text-sub); font-size:20px; font-weight:900; }
  .snb-action {
    padding:12px 16px 14px; font-size:16px; color:var(--text);
    border-top:2px solid var(--border); line-height:1.7;
    display:flex; align-items:center; gap:10px; font-weight:700;
    background:#f7faf9;
  }
  .snb-action-icon { font-size:26px; flex-shrink:0; }

  /* ── 빠른 목적지 버튼 ── */
  .quick-dest-row {
    display:flex; gap:7px; flex-wrap:wrap;
    margin-top:12px;
  }
  .quick-dest-btn {
    padding:12px 18px; border-radius:24px;
    border:2.5px solid var(--border); background:#fff;
    font-size:16px; font-weight:800; font-family:'Noto Sans KR',sans-serif;
    color:var(--text); cursor:pointer; transition:all .15s;
    min-height:48px;
  }
  .quick-dest-btn:hover { border-color:var(--orange); background:var(--orange-light); color:#e65100; }

  /* ── 처음부터 다시 버튼 ── */
  .restart-btn {
    width:100%; margin-top:8px; padding:14px;
    background:transparent; color:var(--text-sub);
    border:2px solid #c8d8d0; border-radius:12px;
    font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif;
    cursor:pointer; min-height:50px;
  }
  .restart-btn:hover { color:var(--text-sub); border-color:#bbb; }

  /* ── 마커: SVG 핀 스타일 ── */
  .marker-pin {
    position:absolute; z-index:10; transform:translate(-50%,-100%);
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.35));
    animation:pinFloat 2s ease-in-out infinite;
  }
  .marker-pin svg { display:block; }

  /* 유도선 SVG */
  .path-svg{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none;overflow:visible;}
  /* 복도 채움 레이어 */
  .path-fill{fill:none;stroke:rgba(255,140,66,0.30);stroke-width:5;stroke-linecap:square;stroke-linejoin:miter;}
  /* 중앙 진한 유도선 */
  .path-line{fill:none;stroke:#ff8c42;stroke-width:2.4;stroke-linecap:square;stroke-linejoin:miter;opacity:1;}

  /* 지도 */
  .map-wrapper{position:relative;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.14);}
  .floor-map{width:100%;height:auto;display:block;cursor:zoom-in;transition:transform .2s;}
  .floor-map:hover{transform:scale(1.005);}

  /* 마커 — 핀 모양 (글자 가림 방지) */
  @keyframes pinFloat{
    0%,100%{ transform:translate(-50%,-100%) translateY(0); }
    50%    { transform:translate(-50%,-100%) translateY(-4px); }
  }
  .marker {
    position: absolute;
    z-index: 10;
    width: 24px;
    height: 30px;
    transform: translate(-50%, -100%);
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.30));
    animation: pinFloat 2s ease-in-out infinite;
  }
  /* 핀 머리 */
  .marker::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%) rotate(-45deg);
    transform-origin: center;
    width: 20px; height: 20px;
    border-radius: 50% 50% 50% 0;
    border: 2.5px solid rgba(255,255,255,0.85);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2);
  }
  /* 핀 꼬리 그림자 */
  .marker::after {
    content: '';
    position: absolute;

/* ── 탭 ── */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(tab==='route'){
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('panelRoute').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('panelQuick').classList.add('active');
  }
  hideResults();
}

/* ── 유틸 ── */
function norm(s){return s.toLowerCase().replace(/\s+/g,'');}
function resolveKey(raw){
  if(!raw)return null;
  const low=raw.trim().toLowerCase();
  const ali=aliases[low]||low;
  return Object.keys(positions).find(k=>k.toLowerCase().includes(ali))||null;
}
function hideResults(){
  mapsContainer.style.display='none';
  mapsContainer.innerHTML='';
  resultChip.style.display='none';
  legendBox.style.display='none';
  _navSteps=[];
  const nb=document.getElementById('stepNavBar');
  if(nb) nb.classList.remove('visible');
}
function showLoading(){loadingOverlay.style.display='flex';}
function hideLoading(){loadingOverlay.style.display='none';}
function triggerFadeIn(el){el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');}
function scrollToResult(){setTimeout(()=>resultChip.scrollIntoView({behavior:'smooth',block:'start'}),120);}
function scrollToMap(){
  setTimeout(()=>{
    const target=document.getElementById('stepNavBar')?.classList.contains('visible')
      ? document.getElementById('stepNavBar')
      : mapsContainer;
    target.scrollIntoView({behavior:'smooth',block:'start'});
  },200);
}
function showResult(title,body,isOrange){
  chipTitle.textContent=title;
  chipBody.innerHTML=body;
  resultChip.className='result-chip'+(isOrange?' orange-accent':'')+' fade-in';
  resultChip.style.display='block';
  triggerFadeIn(resultChip);
  scrollToResult();
}

/* ── 자동완성 ── */
function getSuggestions(query){
  if(!query)return[];
  const q=norm(query);
  const am=[];
  Object.keys(aliases).forEach(k=>{if(norm(k).includes(q)&&positions[aliases[k]])am.push(aliases[k]);});
  const dm=Object.keys(positions).filter(k=>norm(k).includes(q));
  return[...new Set([...am,...dm])].slice(0,6).map(n=>({name:n,floor:positions[n].floor}));
}
const preloadedFloors=new Set();
function preloadFloor(f){if(preloadedFloors.has(f)||!maps[f])return;preloadedFloors.add(f);new Image().src=maps[f];}
function fillSuggestions(listEl,boxEl,sugs,targetInput){
  listEl.innerHTML='';
  if(!sugs.length){boxEl.style.display='none';return;}
  sugs.forEach(s=>{
    const div=document.createElement('div');
    div.className='suggest-item';
    div.innerHTML=`<b>${s.name}</b><span class="suggest-floor">${s.floor}</span>`;
    div.addEventListener('mouseenter',()=>preloadFloor(s.floor));
    div.addEventListener('touchstart',()=>preloadFloor(s.floor),{passive:true});
    div.onclick=()=>{
      targetInput.value=s.name;
      boxEl.style.display='none';
      if(targetInput===searchInput)searchPlace();
      else if(targetInput===endInput)navigateRoute();
      else if(targetInput===startInput&&endInput.value.trim())navigateRoute();
    };
    listEl.appendChild(div);
  });
  boxEl.style.display='block';
}
function showSuggestions(type){
  if(type==='start')fillSuggestions(startSuggestList,startSuggestBox,getSuggestions(startInput.value),startInput);
  if(type==='end')fillSuggestions(endSuggestList,endSuggestBox,getSuggestions(endInput.value),endInput);
  if(type==='search')fillSuggestions(searchSuggestList,searchSuggestBox,getSuggestions(searchInput.value),searchInput);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#startSuggest')&&!e.target.closest('#startInput'))startSuggestBox.style.display='none';
  if(!e.target.closest('#endSuggest')&&!e.target.closest('#endInput'))endSuggestBox.style.display='none';
  if(!e.target.closest('#searchSuggest')&&!e.target.closest('#searchInput'))searchSuggestBox.style.display='none';
});

/* ── 입력 컨트롤 ── */
function handleStartEnter(e){if(e.key==='Enter'){e.preventDefault();endInput.focus();}}
function toggleClear(inputId,btnId){
  const v=document.getElementById(inputId).value.trim();
  const b=document.getElementById(btnId);
  if(b)v?b.classList.add('visible'):b.classList.remove('visible');
}
function clearInput(inputId,btnId,sugType){
  const el=document.getElementById(inputId);
  el.value='';toggleClear(inputId,btnId);showSuggestions(sugType);el.focus();
}
function updateBtnState(){const b=document.getElementById('btnRoute');if(b)b.disabled=!endInput.value.trim();}
function updateSearchBtnState(){const b=document.getElementById('btnSearch');if(b)b.disabled=!searchInput.value.trim();}

/* ── 이동수단 배지 정보 ── */
function getTransportBadge(step){
  if(!step.nextDesc) return null;
  const t=step.nextDesc;
  if(t.includes('연결통로')) return {cls:'conn', icon:'🔀', label:'연결통로 이동'};
  // 엘리베이터와 에스컬레이터 구분
  if(t.includes('에스컬레이터')&&!t.includes('엘리베이터'))
    return {cls:'elev', icon:'🪜', label:'에스컬레이터 이용'};
  if(t.includes('엘리베이터')&&!t.includes('에스컬레이터'))
    return {cls:'elev', icon:'🛗', label:'엘리베이터 이용'};
  if(t.includes('엘리베이터')||t.includes('에스컬레이터'))
    return {cls:'elev', icon:'🛗🪜', label:'엘리베이터·에스컬레이터 이용'};
  return {cls:'walk', icon:'🚶', label:'도보 이동'};
}

/* ── 지도 블록 생성 ── */
let currentStepIndex = 0;
let totalSteps = 0;

function createMapBlock(step, index, total){
  const typeClass = index===0?'type-start':(index===total-1?'type-end':'type-mid');
  const block=document.createElement('div');
  block.id='step-block-'+index;
  block.className='step-block fade-in'+(total===1?' always-show':'');
  if(total>1 && index===0) block.classList.add('active-step');

  // 헤딩 (출발/도착 역할 배지 추가)
  const roleLabel = index===0?'출발':(index===total-1?'도착':'경유');
  const heading=document.createElement('div');
  heading.className='step-heading '+typeClass;
  heading.innerHTML=
    `<div class="step-num">${index+1}</div>`+
    `<div style="flex:1">${step.icon} ${step.floorLabel}</div>`+
    (total>1?`<span class="step-role-badge">${roleLabel}</span>`:'');
  block.appendChild(heading);

  // 액션 박스 (지도 위 강조)
  if(step.action){
    const a=step.action;
    const ab=document.createElement('div');
    ab.className='action-box '+a.type;
    ab.innerHTML=
      `<div class="action-label ${a.type}">${a.type==='elev'?'🛗 이동 방법':a.type==='conn'?'🔀 이동 방법':'📍 안내'}</div>`+
      `<div class="action-main ${a.type}">${a.dest}으로 이동</div>`+
      `<div class="action-sub ${a.type}">${a.sub}</div>`;
    block.appendChild(ab);
  }

  // 지도
  const wrapper=document.createElement('div');
  wrapper.className='map-wrapper';
  const img=document.createElement('img');
  img.className='floor-map';
  img.src=maps[step.floor];
  img.alt=step.floor+' 지도';
  img.loading='lazy';
  img.onclick=()=>{
    // 현재 단계의 경로 포인트 전달
    const pts = step.pathFrom && step.pathTo && corridorGraph[step.floor]
      ? (()=>{
          const g=corridorGraph[step.floor];
          const sId=nearestNode(g.nodes,parseFloat(step.pathFrom.left),parseFloat(step.pathFrom.top));
          const eId=nearestNode(g.nodes,parseFloat(step.pathTo.left),parseFloat(step.pathTo.top));
          if(sId===eId) return null;
          const ids=dijkstra(g.nodes,g.edges,sId,eId);
          return ids ? simplifyPath(ids.map(id=>({x:g.nodes[id].x,y:g.nodes[id].y}))) : null;
        })()
      : null;
    openImagePopup(img.src, pts, step.floorLabel);
  };
  wrapper.appendChild(img);

  (step.markers||[]).forEach(m=>{
    const marker=document.createElement('div');
    marker.className='marker '+m.type;
    marker.style.top=m.pos.top;
    marker.style.left=m.pos.left;
    wrapper.appendChild(marker);
  });

  // 복도 유도선
  applyGuidePath(wrapper, step, img);

  block.appendChild(wrapper);

  // 다음/이전 버튼 (다단계일 때만, dest-callout 제거)
  if(total>1){
    if(index<total-1){
      const badge=getTransportBadge(step);
      const destMatch=(step.nextDesc||'').match(/→\s*(.+)$/);
      const destTxt=destMatch?destMatch[1]:'다음 단계';
      let btnIcon='🚶', btnTxt=destTxt+'으로 이동';
      if(badge&&badge.cls==='elev') { btnIcon='🛗'; btnTxt='탑승 후 '+destTxt+'으로 이동'; }
      else if(badge&&badge.cls==='conn') { btnIcon='🔀'; btnTxt='연결통로 통해 '+destTxt+'으로 이동'; }
      const nb=document.createElement('button');
      nb.className='next-btn';
      nb.innerHTML=`${btnIcon} ${btnTxt} <span style="font-size:18px;margin-left:4px">→</span>`;
      nb.onclick=()=>goToStep(index+1, total);
      block.appendChild(nb);
    }
    if(index>0){
      const pb=document.createElement('button');
      pb.className='prev-btn';
      pb.innerHTML='← 이전 단계로 돌아가기';
      pb.onclick=()=>goToStep(index-1, total);
      block.appendChild(pb);
      // 처음부터 다시 (마지막 단계에서만)
      if(index===total-1){
        const rb=document.createElement('button');
        rb.className='restart-btn';
        rb.textContent='↺ 처음부터 다시';
        rb.onclick=restartNav;
        block.appendChild(rb);
      }
    }
  }
  return block;
}

/* ── 단계 이동 ── */
function goToStep(idx, total){
  currentStepIndex=idx;
  for(let i=0;i<total;i++){
    const b=document.getElementById('step-block-'+i);
    if(!b) continue;
    b.classList.remove('active-step');
    if(i===idx) b.classList.add('active-step');
  }
  updateProgressBar(idx, total);
  updateStepNavBar(idx, total);
  // 스크롤: stepNavBar 기준
  const nb=document.getElementById('stepNavBar');
  if(nb) nb.scrollIntoView({behavior:'smooth',block:'start'});
}

/* stepNavBar 업데이트 */
let _navSteps=[];
function updateStepNavBar(idx, total){
  const bar=document.getElementById('stepNavBar');
  if(!bar||!_navSteps.length) return;
  bar.classList.add('visible');
  const step=_navSteps[idx];
  const nextStep=_navSteps[idx+1];

  document.getElementById('snbCounter').textContent=`${idx+1} / ${total}단계`;
  document.getElementById('snbStatus').textContent= idx===0?'📍 현재 위치':idx===total-1?'🏁 목적지':'🚶 이동 중';
  document.getElementById('snbCurrent').textContent=step?step.floorLabel:'';
  document.getElementById('snbNext').textContent=nextStep?nextStep.floorLabel:'목적지';

  // 액션 아이콘/텍스트
  const badge=step?getTransportBadge(step):null;
  const icon=idx===total-1?'🏁':badge?badge.icon:'🚶';
  const destMatch=step&&step.nextDesc?(step.nextDesc.match(/→\s*(.+)$/))||['','다음 단계']:['','목적지'];
  let actionTxt=idx===total-1?'목적지에 도착했어요! 주황색 핀을 확인하세요'
    :badge&&badge.cls==='elev'?`🛗 엘리베이터·에스컬레이터를 타고 ${destMatch[1]}으로 이동`
    :badge&&badge.cls==='conn'?`🔀 연결통로를 통해 ${destMatch[1]}으로 이동`
    :`${destMatch[1]} 방향으로 이동하세요`;
  document.getElementById('snbActionIcon').textContent=icon;
  document.getElementById('snbActionText').textContent=actionTxt;
}

/* ── 진행바 업데이트 ── */
function updateProgressBar(activeIdx, total){
  const bar=document.getElementById('routeProgressBar');
  if(!bar) return;
  bar.querySelectorAll('.pb-circle').forEach((c,i)=>{
    c.className='pb-circle '+(i<activeIdx?'done':i===activeIdx?'active':'inactive');
  });
  bar.querySelectorAll('.pb-label').forEach((l,i)=>{
    l.className='pb-label'+(i===activeIdx?' active':'');
  });
  bar.querySelectorAll('.pb-line').forEach((l,i)=>{
    l.className='pb-line'+(i<activeIdx?' done':'');
  });
}

/* 가장 가까운 노드 */
function nearestNode(nodes, px, py){
  let best=null, minD=Infinity;
  Object.entries(nodes).forEach(([id,n])=>{
    const d=Math.sqrt((px-n.x)**2+(py-n.y)**2);
    if(d<minD){minD=d;best=id;}
  });
  return best;
}

/* 거리 기반 다익스트라 (BFS 대체) — 홉 수가 아닌 실제 거리로 최단경로 탐색 */
function dijkstra(nodes, edges, sId, eId){
  if(sId===eId) return [sId];

  // 인접 리스트 구성
  const adj={};
  Object.keys(nodes).forEach(id=>adj[id]=[]);
  edges.forEach(([a,b])=>{
    const dx=nodes[a].x-nodes[b].x, dy=nodes[a].y-nodes[b].y;
    const w=Math.sqrt(dx*dx+dy*dy);
    adj[a].push({id:b,w}); adj[b].push({id:a,w});
  });

  // 다익스트라
  const dist={};
  const prev={};
  Object.keys(nodes).forEach(id=>{dist[id]=Infinity; prev[id]=null;});
  dist[sId]=0;

  // 미니힙 대신 단순 정렬 배열 (노드 수 적으므로 충분)
  const unvisited=new Set(Object.keys(nodes));

  while(unvisited.size>0){
    // 현재 최소 거리 노드 선택
    let cur=null;
    unvisited.forEach(id=>{
      if(cur===null||dist[id]<dist[cur]) cur=id;
    });
    if(cur===null||dist[cur]===Infinity) break;
    if(cur===eId) break;
    unvisited.delete(cur);

    adj[cur].forEach(({id:nb,w})=>{
      if(!unvisited.has(nb)) return;
      const alt=dist[cur]+w;
      if(alt<dist[nb]){dist[nb]=alt;prev[nb]=cur;}
    });
  }

  if(dist[eId]===Infinity) return null;
  const path=[];
  let cur=eId;
  while(cur!==null){path.unshift(cur);cur=prev[cur];}
  return path;
}

/* 경로 단순화: 방향이 같은 중간 점 제거 */
function simplifyPath(pts){
  if(pts.length<=2) return pts;
  const result=[pts[0]];
  for(let i=1;i<pts.length-1;i++){
    const prev=result[result.length-1];
    const cur=pts[i];
    const next=pts[i+1];
    const dx1=cur.x-prev.x, dy1=cur.y-prev.y;
    const dx2=next.x-cur.x, dy2=next.y-cur.y;
    // 방향이 바뀌면 (교차점) 유지, 같은 방향이면 제거
    const cross=Math.abs(dx1*dy2-dy1*dx2);
    if(cross>0.5) result.push(cur);
  }
  result.push(pts[pts.length-1]);
  return result;
}

/* 경로 좌표 배열 */
function getCorridorPoints(floor, fromPct, toPct){
  const g=corridorGraph[floor];
  if(!g) return [fromPct, toPct];
  const sId=nearestNode(g.nodes, fromPct.x, fromPct.y);
  const eId=nearestNode(g.nodes, toPct.x,   toPct.y);
  const ids=dijkstra(g.nodes, g.edges, sId, eId);
  if(!ids) return [fromPct, toPct];
  const raw=[...ids.map(id=>({x:g.nodes[id].x,y:g.nodes[id].y}))];
  return simplifyPath(raw);
}

/* SVG 유도선 그리기 */
function drawGuidePath(wrapper, pts, delay){
  wrapper.querySelectorAll('.path-svg').forEach(s=>s.remove());
  if(!pts||pts.length<2) return;

  let len=0;
  for(let i=1;i<pts.length;i++)
    len+=Math.sqrt((pts[i].x-pts[i-1].x)**2+(pts[i].y-pts[i-1].y)**2);
  const ps=pts.map(p=>`${(+p.x).toFixed(2)},${(+p.y).toFixed(2)}`).join(' ');
  const d=delay||0;

  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('path-svg');
  svg.setAttribute('viewBox','0 0 100 100');
  svg.setAttribute('preserveAspectRatio','none');

  // 1층: 두꺼운 반투명 복도 채움 (회색 복도 안을 채우는 효과)
  const fill=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  fill.setAttribute('points',ps);
  fill.setAttribute('class','path-fill');
  fill.style.strokeDasharray=len;
  fill.style.strokeDashoffset=len;
  fill.style.transition='stroke-dashoffset 1.6s ease '+d+'s';

  // 2층: 얇은 진한 중앙선 (구분용)
  const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points',ps);
  line.setAttribute('class','path-line');
  line.style.strokeDasharray=len;
  line.style.strokeDashoffset=len;
  line.style.transition='stroke-dashoffset 1.6s ease '+d+'s';

  // 3층: 흰 점선 (방향감 — 지속 애니메이션)
  const dash=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  dash.setAttribute('points',ps);
  dash.setAttribute('class','path-dash');

  svg.appendChild(fill);
  svg.appendChild(line);
  svg.appendChild(dash);
  wrapper.appendChild(svg);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    fill.style.strokeDashoffset='0';
    line.style.strokeDashoffset='0';
  }));
}

/* step에 유도선 적용 */
function applyGuidePath(wrapper, step, img){
  if(!corridorGraph[step.floor]||!step.pathFrom||!step.pathTo) return;
  const from={x:parseFloat(step.pathFrom.left), y:parseFloat(step.pathFrom.top)};
  const to  ={x:parseFloat(step.pathTo.left),   y:parseFloat(step.pathTo.top)};

  // 복도 그래프에서 출발·도착에 가장 가까운 노드 찾기
  const g=corridorGraph[step.floor];
  const sId=nearestNode(g.nodes, from.x, from.y);
  const eId=nearestNode(g.nodes, to.x,   to.y);

  // 같은 노드면 선 불필요
  if(sId===eId) return;

  // 복도 노드만으로 최단경로 탐색 (마커 원본 좌표 제외 → 벽 통과 방지)
  const ids=dijkstra(g.nodes, g.edges, sId, eId);
  if(!ids||ids.length<2) return;
  const pts=ids.map(id=>({x:g.nodes[id].x, y:g.nodes[id].y}));

  if(img.complete&&img.naturalWidth>0){
    drawGuidePath(wrapper, pts, 0.2);
  } else {
    img.addEventListener('load',()=>drawGuidePath(wrapper, pts, 0.2),{once:true});
  }
}

/* ── 경로 단계 계산 ── */
/* 해당 층의 엘리베이터·에스컬레이터 마커 목록 반환 */
function getTransportMarkers(floor){
  const result=[];
  if(elevators[floor])  result.push({type:'elevator',pos:elevators[floor]});
  if(escalators[floor]) result.push({type:'elevator',pos:escalators[floor]});
  return result;
}

function getBridgeFloor(srcFloor,dstFloor){
  if(srcFloor.includes('3층')||dstFloor.includes('3층'))return'3층';
  return'2층';
}

function getRouteSteps(src,dst,srcFloor,dstFloor){
  const steps=[];
  const srcBuilding=srcFloor?(srcFloor.includes('본관')?'본관':'신관'):null;
  const dstBuilding=dstFloor.includes('본관')?'본관':'신관';
  const sameBuilding=srcBuilding&&srcBuilding===dstBuilding;
  const sameFloor=srcFloor&&srcFloor===dstFloor;

  /* 도착지만 */
  if(!src){
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      desc:'주황색 마커가 목적지예요.',
      markers:[{type:'end',pos:dst}]});
    return steps;
  }

  /* 같은 층 */
  if(sameFloor){
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      desc:'같은 층이에요! 초록색 → 출발지, 주황색 → 도착지',
      markers:[{type:'start',pos:src},{type:'end',pos:dst}],
      pathFrom:src, pathTo:dst});
    return steps;
  }

  /* 같은 건물, 다른 층 */
  if(sameBuilding){
    // 엘리베이터와 에스컬레이터 중 출발지에서 가까운 것을 pathTo로
    function nearerTransport(floor, fromPos){
      const elev=elevators[floor], esc=escalators[floor];
      if(!elev&&!esc) return fromPos;
      if(!elev) return esc;
      if(!esc)  return elev;
      const de=Math.hypot(parseFloat(elev.left)-parseFloat(fromPos.left), parseFloat(elev.top)-parseFloat(fromPos.top));
      const ds=Math.hypot(parseFloat(esc.left) -parseFloat(fromPos.left), parseFloat(esc.top) -parseFloat(fromPos.top));
      return de<=ds ? elev : esc;
    }
    const _tSrc=nearerTransport(srcFloor, src);

    // 출발층에서 선택한 이동수단 종류를 파악 → 도착층도 같은 종류 사용
    const _srcIsEsc = escalators[srcFloor] && _tSrc === escalators[srcFloor];
    // 도착층 시작점: 출발층과 같은 종류 (에스컬레이터면 에스컬레이터, 엘베면 엘베)
    const _tDstSameType = _srcIsEsc
      ? (escalators[dstFloor] || elevators[dstFloor])
      : (elevators[dstFloor]  || escalators[dstFloor]);
    const _tDst = _tDstSameType || nearerTransport(dstFloor, dst);

    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      action:{type:'elev', label:'엘리베이터·에스컬레이터 이용', dest:dstFloor, sub:'갈색 마커 위치로 이동 후 탑승'},
      markers:[{type:'start',pos:src},...getTransportMarkers(srcFloor)],
      pathFrom:src, pathTo:_tSrc||src,
      nextDesc:'엘리베이터·에스컬레이터 탑승 → '+dstFloor});
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      action:{type:'end', label:'목적지 도착', dest:'주황색 핀 위치', sub:'주황색 마커가 목적지예요'},
      markers:[{type:'end',pos:dst}],
      pathFrom:_tDst||dst, pathTo:dst});
    return steps;
  }

  /* 다른 건물 */
  const bl=getBridgeFloor(srcFloor,dstFloor);
  const srcBridge=srcBuilding+' '+bl;
  const dstBridge=dstBuilding+' '+bl;

  if(srcFloor===srcBridge){
    /* 출발층 = 연결통로 층 */
    const conn=connectors[srcBridge];
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      action:{type:'conn', label:'연결통로 이동', dest:dstBuilding+' '+bl, sub:'보라색 마커 방향으로 이동'},
      markers:[{type:'start',pos:src},...(conn?[{type:'connector',pos:conn}]:[])],
      pathFrom:src, pathTo:conn||src,
      nextDesc:bl+' 연결통로 → '+dstBuilding+'으로 이동'});
  } else {
    /* 엘리베이터 타고 연결통로 층으로 */
    const _e2=elevators[srcFloor]||escalators[srcFloor];
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      action:{type:'elev', label:'엘리베이터·에스컬레이터 이용', dest:srcBridge, sub:'갈색 마커 위치로 이동 후 탑승'},
      markers:[{type:'start',pos:src},...getTransportMarkers(srcFloor)],
      pathFrom:src, pathTo:_e2||src,
      nextDesc:'엘리베이터 탑승 → '+srcBridge});
    const conn=connectors[srcBridge];
    const _e3=elevators[srcBridge]||escalators[srcBridge];
    steps.push({floor:srcBridge,floorLabel:srcBridge,icon:'🔀',
      action:{type:'conn', label:'연결통로 이동', dest:dstBuilding+' '+bl, sub:'보라색 마커 방향으로 이동'},
      markers:[...(conn?[{type:'connector',pos:conn}]:[])],
      pathFrom:_e3||conn, pathTo:conn||_e3,
      nextDesc:bl+' 연결통로 → '+dstBuilding+'으로 이동'});
  }

  if(dstFloor===dstBridge){
    /* 도착층 = 연결통로 층 */
    const conn=connectors[dstBridge];
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      action:{type:'end', label:'목적지 도착', dest:'주황색 핀 위치', sub:'연결통로 진입 후 주황색 마커 방향으로 이동'},
      markers:[...(conn?[{type:'connector',pos:conn}]:[]),{type:'end',pos:dst}],
      pathFrom:conn||dst, pathTo:dst});
  } else {
    /* 연결통로 진입 후 엘리베이터 필요 */
    const conn=connectors[dstBridge];
    const _e4=elevators[dstBridge]||escalators[dstBridge];
    steps.push({floor:dstBridge,floorLabel:dstBridge,icon:'🔀',
      action:{type:'elev', label:'엘리베이터·에스컬레이터 이용', dest:dstFloor, sub:'연결통로 진입 후 갈색 마커 위치로 이동'},
      markers:[...(conn?[{type:'connector',pos:conn}]:[]),...getTransportMarkers(dstBridge)],
      pathFrom:conn||_e4, pathTo:_e4||conn,
      nextDesc:'엘리베이터 탑승 → '+dstFloor});
    const _e5=elevators[dstFloor]||escalators[dstFloor];
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      action:{type:'end', label:'목적지 도착', dest:'주황색 핀 위치', sub:'주황색 마커가 목적지예요'},
      markers:[{type:'end',pos:dst}],
      pathFrom:_e5||dst, pathTo:dst});
  }

  return steps;
}

/* ── 렌더링 ── */
function renderSteps(steps){
  mapsContainer.innerHTML='';
  mapsContainer.style.display='block';
  currentStepIndex=0;
  totalSteps=steps.length;
  const total=steps.length;
  _navSteps=steps; // navBar용 저장
  if(total<=1){
    document.getElementById('stepNavBar').classList.remove('visible');
  } else {
    updateStepNavBar(0, total);
  }

  if(total>1){
    // 진행 단계 바
    const bar=document.createElement('div');
    bar.className='progress-bar fade-in';
    bar.id='routeProgressBar';
    steps.forEach((step,i)=>{
      const node=document.createElement('div');
      node.className='pb-step';
      node.onclick=()=>goToStep(i,total);
      node.innerHTML=`<div class="pb-circle ${i===0?'active':'inactive'}">${i+1}</div><div class="pb-label${i===0?' active':''}">${step.floorLabel}</div>`;
      bar.appendChild(node);
      if(i<total-1){
        const line=document.createElement('div');
        line.className='pb-line';
        bar.appendChild(line);
      }
    });
    mapsContainer.appendChild(bar);
  }

  steps.forEach((step,i)=>mapsContainer.appendChild(createMapBlock(step,i,total)));
}

  if(!endKey){showResult('⚠️ 검색 결과 없음','도착지를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.',false);hideResults();return;}

  const src=startKey?positions[startKey]:null;
  const dst=positions[endKey];

  const dstFloor=dst.floor;
  const srcBuilding=srcFloor?(srcFloor.includes('본관')?'본관':'신관'):null;
  const dstBuilding=dstFloor.includes('본관')?'본관':'신관';
  const sameBuilding=srcBuilding&&srcBuilding===dstBuilding;
  const sameFloor=srcFloor&&srcFloor===dstFloor;

    legendBox.style.display='flex';

  const steps=getRouteSteps(src,dst,srcFloor,dstFloor);
  renderSteps(steps);
  triggerFadeIn(mapsContainer);
  scrollToMap();
}

/* ── 팝업 ── */
/* 팝업 줌/패닝 상태 */
let _popupScale=1, _popupTx=0, _popupTy=0;
let _popupPts=null; // 현재 경로 포인트

function applyPopupTransform(){
  const wrap=document.getElementById('popupMapWrap');
  if(wrap) wrap.style.transform=`translate(${_popupTx}px,${_popupTy}px) scale(${_popupScale})`;
}

function openImagePopup(imgSrc, pts, floorLabel){
  const img=document.getElementById('popupImg');
  img.src=imgSrc;
  _popupPts=pts||null;
  _popupScale=1; _popupTx=0; _popupTy=0;
  applyPopupTransform();

  // 층 라벨
  const lbl=document.getElementById('popupFloorLabel');
  if(lbl) lbl.textContent=floorLabel||'';

  document.getElementById('imagePopup').style.display='flex';

function drawPopupOverlay(pts){
  const pathSvg=document.getElementById('popupPathSvg');
  const dimSvg =document.getElementById('popupDimSvg');
  if(!pathSvg||!dimSvg) return;
  pathSvg.innerHTML=''; dimSvg.innerHTML='';
  if(!pts||pts.length<2) return;

  const ps=pts.map(p=>`${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' ');

  // ─ 스포트라이트: 전체 어둡게 + 경로 주변만 밝게 (SVG clip-path) ─
  const imgEl=document.getElementById('popupImg');
  const iw=imgEl.offsetWidth||imgEl.naturalWidth||300;
  const ih=imgEl.offsetHeight||imgEl.naturalHeight||200;

  // dim SVG는 픽셀 기반 (viewBox 없음)
  dimSvg.setAttribute('viewBox',`0 0 ${iw} ${ih}`);
  dimSvg.setAttribute('preserveAspectRatio','none');

  // 경로 픽셀 좌표 변환
  const pxPts=pts.map(p=>({
    x: p.x/100*iw,
    y: p.y/100*ih
  }));
  const pxPs=pxPts.map(p=>`${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  // clip: 경로 주변 버퍼(폭 약 3.5%) 제외하고 어둡게
  const bufPx = iw * 0.038;

  const clipId='popupClip'+Date.now();
  dimSvg.innerHTML=`
    <defs>
      <filter id="blur1"><feGaussianBlur stdDeviation="${bufPx*0.6}"/></filter>
      <mask id="${clipId}">
        <rect width="${iw}" height="${ih}" fill="white" opacity="0.08"/>
        <polyline points="${pxPs}"
          fill="none" stroke="white" stroke-width="${bufPx*2}"
          stroke-linecap="round" stroke-linejoin="round"
          filter="url(#blur1)"/>
      </mask>
    </defs>
    <rect width="${iw}" height="${ih}" fill="rgba(0,0,0,0.55)" mask="url(#${clipId})"/>
  `;

  // ─ 경로선: 채움 + 중앙선 + 흰 점선 ─
  // fill
  const fill=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  fill.setAttribute('points',ps);
  fill.setAttribute('fill','none');
  fill.setAttribute('stroke','rgba(255,140,66,0.40)');
  fill.setAttribute('stroke-width','5');
  fill.setAttribute('stroke-linecap','square');
  fill.setAttribute('stroke-linejoin','miter');
  pathSvg.appendChild(fill);

  // line
  const line=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  line.setAttribute('points',ps);
  line.setAttribute('fill','none');
  line.setAttribute('stroke','#ff8c42');
  line.setAttribute('stroke-width','2.4');
  line.setAttribute('stroke-linecap','square');
  line.setAttribute('stroke-linejoin','miter');

  // 드로우 애니메이션
  let len=0;
  for(let i=1;i<pts.length;i++)
    len+=Math.sqrt((pts[i].x-pts[i-1].x)**2+(pts[i].y-pts[i-1].y)**2);
  line.style.strokeDasharray=len;
  line.style.strokeDashoffset=len;
  line.style.transition='stroke-dashoffset 1.4s ease 0.1s';
  pathSvg.appendChild(line);

  // 흰 점선 애니메이션
  const dash=document.createElementNS('http://www.w3.org/2000/svg','polyline');
  dash.setAttribute('points',ps);
  dash.setAttribute('class','path-dash');
  pathSvg.appendChild(dash);

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    line.style.strokeDashoffset='0';
  }));
}

function closeImagePopup(){
  document.getElementById('imagePopup').style.display='none';
  document.getElementById('popupPathSvg').innerHTML='';
  document.getElementById('popupDimSvg').innerHTML='';
  _popupPts=null; _popupScale=1; _popupTx=0; _popupTy=0;
}

// 줌 버튼
document.getElementById('popupZoomIn').addEventListener('click',e=>{
  e.stopPropagation();
  _popupScale=Math.min(4,_popupScale*1.35); applyPopupTransform();
});
document.getElementById('popupZoomOut').addEventListener('click',e=>{
  e.stopPropagation();
  _popupScale=Math.max(1,_popupScale/1.35);
  if(_popupScale<=1){_popupTx=0;_popupTy=0;}
  applyPopupTransform();
});

// 핀치줌 + 드래그 (모바일)
(function(){
  const wrap=document.getElementById('popupMapWrap');
  let lastDist=0, startScale=1, startTx=0, startTy=0, startX=0, startY=0, isPan=false;
  wrap.addEventListener('touchstart',e=>{
    if(e.touches.length===2){
      lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      startScale=_popupScale; isPan=false;
    } else if(e.touches.length===1){
      startX=e.touches[0].clientX-_popupTx;
      startY=e.touches[0].clientY-_popupTy;
      isPan=true;
    }
  },{passive:true});
  wrap.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      _popupScale=Math.max(1,Math.min(4,startScale*d/lastDist));
      applyPopupTransform(); e.preventDefault();
    } else if(e.touches.length===1&&isPan&&_popupScale>1){
      _popupTx=e.touches[0].clientX-startX;
      _popupTy=e.touches[0].clientY-startY;
      applyPopupTransform(); e.preventDefault();
    }
  },{passive:false});
  wrap.addEventListener('touchend',()=>{
    if(_popupScale<=1.05){_popupScale=1;_popupTx=0;_popupTy=0;applyPopupTransform();}
  },{passive:true});
})();

document.getElementById('imagePopup').addEventListener('click',e=>{
  if(e.target===document.getElementById('imagePopup')) closeImagePopup();
});

    adminMode=false;alert('관리자 모드 종료');

  }

function handleAdminClick(e){
  if(!adminMode)return;
  const img=e.target.closest('.floor-map');
  if(!img)return;
  const rect=img.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const y=((e.clientY-rect.top)/rect.height*100).toFixed(1);
  const floor=img.alt.replace(' 지도','');
  const label=prompt(`이름 입력\n좌표: top:${y}%, left:${x}%\n층: ${floor}`);
  if(!label)return;
  positions[label]={floor,top:y+'%',left:x+'%'};
  alert(`${floor} · ${label} 추가 완료!`);
}

  const params=new URLSearchParams(location.search);
  const from=params.get('from'), to=params.get('to');
  if(!from&&!to) return;

  function applyParams(){
    if(from){
      const key=resolveKey(from)||from;
      startInput.value=key;
      toggleClear('startInput','clearStart');
      showQRBanner(key, to?(resolveKey(to)||to):null);

      toggleClear('endInput','clearEnd');

  // 층 선택 드롭다운
  Object.keys(corridorGraph).forEach(f => {
    const opt = document.createElement('option');
    opt.value = f; opt.textContent = f;
    floorSel.appendChild(opt);
  });

  // datalist 채우기
  function fillDatalist() {
    ['edFromList','edToList'].forEach(id => {
      const dl = document.getElementById(id);
      dl.innerHTML = Object.keys(positions).map(k=>`<option value="${k}">`).join('');
    });
  }
  fillDatalist();

  function setMode(m, label) {
    mode = m; edgeFrom = null; selectedNode = null;
    modeLabel.textContent = label;
    statusMsg.textContent = {
      move:    '드래그=이동 | 엣지모드: 두 노드 순서대로 클릭',
      addNode: '지도를 클릭해서 노드를 추가하세요',
      addEdge: '연결할 첫 번째 노드를 클릭하세요',
      delNode: '삭제할 노드를 클릭하세요',
    }[m];
    renderAll();
  }

  function loadFloor(floor) {
    currentFloor = floor;
    if (!workGraph[floor]) workGraph[floor] = {nodes:{},edges:[]};
    mapImg.src = maps[floor];
    selectedNode = null; edgeFrom = null;
    renderAll();
  }

  // ── 렌더링 ──
  function getImgRect() {
    // object-fit 없이 absolute center 방식이므로 getBoundingClientRect() = 실제 이미지 크기
    return mapImg.getBoundingClientRect();
  }
  function getCanvasRect() { return canvas.getBoundingClientRect(); }

  /* 퍼센트 좌표 → 캔버스 픽셀 좌표 변환
     이미지가 캔버스 중앙에 위치하므로 offset 계산이 핵심 */
  function pctToCanvas(xPct, yPct) {
    const ir = getImgRect();
    const cr = getCanvasRect();
    return {
      x: (ir.left - cr.left) + xPct / 100 * ir.width,
      y: (ir.top  - cr.top)  + yPct / 100 * ir.height
    };
  }

  /* 캔버스 픽셀 → 이미지 퍼센트 좌표 변환 */
  function canvasToPct(clientX, clientY) {
    const ir = getImgRect();
    const xP = Math.round((clientX - ir.left) / ir.width  * 1000) / 10;
    const yP = Math.round((clientY - ir.top)  / ir.height * 1000) / 10;
    return {
      x: Math.max(0, Math.min(100, xP)),
      y: Math.max(0, Math.min(100, yP))
    };
  }

  function renderAll(previewPts) {
    svg.innerHTML = '';
    canvas.querySelectorAll('.ed-node').forEach(n=>n.remove());
    const g = workGraph[currentFloor];
    if (!g) return;

    // ── 엣지 ──
    (g.edges||[]).forEach(([a,b]) => {
      const na = g.nodes[a], nb = g.nodes[b];
      if (!na||!nb) return;
      const p1 = pctToCanvas(na.x, na.y);
      const p2 = pctToCanvas(nb.x, nb.y);
      const line = document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1',p1.x); line.setAttribute('y1',p1.y);
      line.setAttribute('x2',p2.x); line.setAttribute('y2',p2.y);
      line.setAttribute('stroke','rgba(0,150,136,0.55)');
      line.setAttribute('stroke-width','2.5');
      // 엣지 삭제 (더블클릭)
      line.style.cursor = 'pointer';
      line.setAttribute('pointer-events','stroke');
      const ea=a,eb=b;
      line.addEventListener('dblclick', ()=>{
        if(!confirm(`엣지 ${ea}↔${eb} 를 삭제하시겠습니까?`)) return;
        workGraph[currentFloor].edges = workGraph[currentFloor].edges.filter(([x,y])=>!(x===ea&&y===eb)&&!(x===eb&&y===ea));
        renderAll();
      });
      svg.appendChild(line);
    });

    // ── 미리보기 경로선 ──
    if (previewPts && previewPts.length >= 2) {
      const ps = previewPts.map(p => {
        const c2 = pctToCanvas(p.x, p.y);
        return `${c2.x},${c2.y}`;
      }).join(' ');
      const fill = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      fill.setAttribute('points',ps);
      fill.setAttribute('fill','none');
      fill.setAttribute('stroke','rgba(255,140,66,0.35)');
      fill.setAttribute('stroke-width','8');
      fill.setAttribute('stroke-linecap','square');
      fill.setAttribute('stroke-linejoin','miter');
      svg.appendChild(fill);
      const line = document.createElementNS('http://www.w3.org/2000/svg','polyline');
      line.setAttribute('points',ps);
      line.setAttribute('fill','none');
      line.setAttribute('stroke','#ff8c42');
      line.setAttribute('stroke-width','2.5');
      line.setAttribute('stroke-linecap','square');
      line.setAttribute('stroke-linejoin','miter');
      svg.appendChild(line);
    }

    // ── 노드 ──
    Object.entries(g.nodes).forEach(([id, n]) => {
      const pos = pctToCanvas(n.x, n.y);
      const nd = document.createElement('div');
      nd.className = 'ed-node' + (id===selectedNode?' selected':'') + (id===edgeFrom?' edge-from':'');
      nd.textContent = String(id).length <= 3 ? id : id.slice(0,3);
      nd.title = `${id}  x:${n.x} y:${n.y}`;
      nd.style.left = pos.x + 'px';
      nd.style.top  = pos.y + 'px';
      nd.dataset.id = id;

      function startDrag(clientX, clientY) {
        selectedNode = id;
        selLabel.textContent = `${id} (${n.x}, ${n.y})`;
        dragging = id;
        // 이미지 기준 오프셋: 노드 중심과 터치/클릭 위치의 차이
        // dragOff를 0으로 하면 손가락/마우스 위치 = 노드 중심
        dragOffX = 0;
        dragOffY = 0;
        renderAll();
      }
      function handleNodeTap(clientX, clientY) {
        if (mode==='delNode') { deleteNode(id); return; }
        if (mode==='addEdge') {
          if (!edgeFrom) {
            edgeFrom = id;
            statusMsg.textContent = `"${id}" 선택됨 → 두 번째 노드 탭`;
            renderAll();
          } else if (edgeFrom !== id) {
            addEdge(edgeFrom, id); edgeFrom = null;
          }
          return;
        }
        startDrag(clientX, clientY);
      }
      nd.addEventListener('mousedown', e => {
        e.stopPropagation();
        handleNodeTap(e.clientX, e.clientY);
      });
      nd.addEventListener('touchstart', e => {
        e.stopPropagation();
        e.preventDefault();
        const t = e.touches[0];
        handleNodeTap(t.clientX, t.clientY);
      }, {passive: false});
      canvas.appendChild(nd);
    });
  }

  // ── 드래그 공통 처리 함수 ──
  function onDragMove(clientX, clientY) {
    if (!dragging) return;
    const g = workGraph[currentFloor];
    if (!g||!g.nodes[dragging]) return;
    // dragOff 보정 후 퍼센트 계산
    const {x:xP, y:yP} = canvasToPct(clientX - dragOffX, clientY - dragOffY);
    g.nodes[dragging].x = xP;
    g.nodes[dragging].y = yP;
    coordLabel.textContent = `x:${xP} y:${yP}`;
    selLabel.textContent = `${dragging} (${xP}, ${yP})`;
    renderAll();
    autoSaveLocal();
  }

  // 마우스 드래그
  document.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
  document.addEventListener('mouseup', () => { dragging = null; });

  // 터치 드래그 (모바일)
  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches[0];
    onDragMove(t.clientX, t.clientY);
  }, {passive: false});
  document.addEventListener('touchend', () => { dragging = null; });
  document.addEventListener('touchcancel', () => { dragging = null; });

  // 클릭으로 노드 추가
  function addNodeAt(clientX, clientY) {
    const {x:xP, y:yP} = canvasToPct(clientX, clientY);
    const g = workGraph[currentFloor];
    const newId = prompt(`새 노드 ID:\n좌표: x=${xP}, y=${yP}`);
    if (!newId?.trim()) return;
    if (g.nodes[newId.trim()]) { alert('이미 존재하는 ID입니다.'); return; }
    g.nodes[newId.trim()] = {x:xP, y:yP};
    autoSaveLocal(); renderAll();
  }
  canvas.addEventListener('click', e => {
    if (mode !== 'addNode') return;
    if (e.target.classList.contains('ed-node')) return;
    addNodeAt(e.clientX, e.clientY);
  });
  canvas.addEventListener('touchend', e => {
    if (mode !== 'addNode') return;
    if (e.target.classList.contains('ed-node')) return;
    if (dragging) return;
    e.preventDefault();
    const t = e.changedTouches[0];
    addNodeAt(t.clientX, t.clientY);
  }, {passive: false});

  function addEdge(a, b) {
    const g = workGraph[currentFloor];
    if (g.edges.some(([x,y])=>(x===a&&y===b)||(x===b&&y===a))) { alert('이미 연결된 엣지입니다.'); return; }
    // 대각선 경고: x와 y가 모두 다르면 벽 관통 가능성 높음
    const na = g.nodes[a], nb = g.nodes[b];
    if (na && nb) {
      const dx = Math.abs(na.x - nb.x), dy = Math.abs(na.y - nb.y);
      if (dx > 2 && dy > 2) {
        const ok = confirm(
          `⚠️ 대각선 엣지 경고
` +
          `${a}(${na.x},${na.y}) ↔ ${b}(${nb.x},${nb.y})
` +
          `x차이=${dx.toFixed(1)}, y차이=${dy.toFixed(1)}

` +
          `이 엣지는 대각선으로 그려져 벽을 관통할 수 있어요.
` +
          `수평/수직 엣지만 사용을 권장합니다.

` +
          `그래도 추가하시겠습니까?`
        );
        if (!ok) return;
      }
    }
    g.edges.push([a, b]);
    statusMsg.textContent = `엣지 추가됨: ${a} ↔ ${b}`;
    autoSaveLocal();
    renderAll();
  }

  function deleteNode(id) {
    if (!confirm(`"${id}" 노드를 삭제하시겠습니까?`)) return;
    const g = workGraph[currentFloor];
    delete g.nodes[id];
    g.edges = g.edges.filter(([a,b])=>a!==id&&b!==id);
    selectedNode = null;
    autoSaveLocal();
    renderAll();
  }

  // ── 자동 저장 (localStorage) ──
  function autoSaveLocal() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(workGraph));
      saveStatus.textContent = '💾 자동저장됨';
      setTimeout(()=>saveStatus.textContent='', 2000);
    } catch(e) {}
  }

  // ── 코드 생성 ──
  function buildCode() {
    let code = 'const corridorGraph = {\n\n';
    Object.entries(workGraph).forEach(([floor, g]) => {
      code += `  '${floor}': {\n    nodes: {\n`;
      Object.entries(g.nodes).forEach(([id, n]) => {
        code += `      ${id}:{x:${n.x},y:${n.y}},\n`;
      });
      code += `    },\n    edges:[\n`;
      (g.edges||[]).forEach(([a,b]) => { code += `      ['${a}','${b}'],\n`; });
      code += `    ]\n  },\n\n`;
    });
    return code + '};\n';
  }

  function exportCode() {
    document.getElementById('edExportText').value = buildCode();
    exportBox.style.display = 'block';
    overlay.style.display = 'block';
  }

  // ── 불러오기 ──
  function importCode() {
    const raw = document.getElementById('edImportText').value.trim();
    if (!raw) { alert('코드를 붙여넣어 주세요.'); return; }
    try {
      // 안전하게 corridorGraph 객체 추출
      const match = raw.match(/const corridorGraph\s*=\s*(\{[\s\S]*\})\s*;?/);
      if (!match) throw new Error('corridorGraph 형식이 아닙니다.');
      const fn = new Function('return ' + match[1]);
      const imported = fn();
      workGraph = imported;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(workGraph));
      // 드롭다운 업데이트
      floorSel.innerHTML = '';
      Object.keys(workGraph).forEach(f => {
        const opt = document.createElement('option'); opt.value=f; opt.textContent=f;
        floorSel.appendChild(opt);
      });
      currentFloor = Object.keys(workGraph)[0];
      importBox.style.display = 'none';
      overlay.style.display  = 'none';
      document.getElementById('edImportText').value = '';
      loadFloor(currentFloor);
      saveStatus.textContent = '✅ 불러오기 완료!';
      setTimeout(()=>saveStatus.textContent='', 3000);
    } catch(e) {
      alert('코드 파싱 오류:\n' + e.message);
    }
  }

  // ── 경로 미리보기 ──
  function runPreview() {
    const fromVal = document.getElementById('edPreviewFrom').value.trim();
    const toVal   = document.getElementById('edPreviewTo').value.trim();
    const result  = document.getElementById('edPreviewResult');

    const fromKey = resolveKey(fromVal);
    const toKey   = resolveKey(toVal);
    if (!fromKey && fromVal) { result.textContent = `⚠️ "${fromVal}" 을 찾을 수 없어요.`; return; }
    if (!toKey)   { result.textContent = `⚠️ "${toVal}" 을 찾을 수 없어요.`; return; }

    const src = fromKey ? positions[fromKey] : null;
    const dst = positions[toKey];
    const srcFloor = src ? src.floor : null;
    const dstFloor = dst.floor;

    let info = `출발: ${fromKey||'(없음)'} — ${srcFloor||'-'}\n도착: ${toKey} — ${dstFloor}\n`;

    // 현재 층이 관련 층이면 바로 경로 그리기
    const floorToShow = srcFloor || dstFloor;
    if (floorSel.value !== floorToShow) {
      floorSel.value = floorToShow;
      loadFloor(floorToShow);
    }

    const g = workGraph[floorToShow];
    if (!g) { result.textContent = info + `\n❌ ${floorToShow} 그래프 없음`; return; }

    const fromPct = src
      ? {x:parseFloat(src.left),   y:parseFloat(src.top)}
      : {x:parseFloat(dst.left),   y:parseFloat(dst.top)};
    const toPct   = {x:parseFloat(dst.left), y:parseFloat(dst.top)};

    const sId = nearestNode(g.nodes, fromPct.x, fromPct.y);
    const eId = nearestNode(g.nodes, toPct.x,   toPct.y);
    info += `\n가장 가까운 노드: 출발=${sId}, 도착=${eId}\n`;

    const ids = dijkstra(g.nodes, g.edges, sId, eId);
    if (!ids) { result.textContent = info + '\n❌ 경로를 찾을 수 없어요.'; renderAll(); return; }

    const pts = simplifyPath(ids.map(id=>({x:g.nodes[id].x, y:g.nodes[id].y})));
    info += `경로 노드: ${ids.join(' → ')}\n(${pts.length}개 점으로 단순화)`;
    result.textContent = info;

    renderAll(pts);
  }

  // ── 이벤트 바인딩 ──
  floorSel.addEventListener('change', () => loadFloor(floorSel.value));
  document.getElementById('edAddNode').addEventListener('click', () => setMode('addNode','＋ 노드 추가'));
  document.getElementById('edAddEdge').addEventListener('click', () => setMode('addEdge','🔗 엣지 연결'));
  document.getElementById('edDelNode').addEventListener('click', () => setMode('delNode','🗑 노드 삭제'));
  document.getElementById('edSave').addEventListener('click', exportCode);

  document.getElementById('edImport').addEventListener('click', () => {
    importBox.style.display='block'; overlay.style.display='block';
  });
  document.getElementById('edPreview').addEventListener('click', () => {
    const panel = document.getElementById('edPreviewPanel');
    const isActive = panel.classList.contains('active');
    panel.classList.toggle('active');
    // 패널 열릴 때 입력 포커스
    if (!isActive) {
      setTimeout(()=>document.getElementById('edPreviewFrom').focus(), 50);
    }
  });

  document.getElementById('edClose').addEventListener('click', () => {
    if (confirm('에디터를 닫겠습니까?')) location.href = location.pathname;
  });

  // 내보내기 팝업
  document.getElementById('edCopyBtn').addEventListener('click', () => {
    const txt = document.getElementById('edExportText').value;
    navigator.clipboard.writeText(txt)
      .then(()=>alert('✅ 클립보드에 복사되었습니다!'))
      .catch(()=>{ document.getElementById('edExportText').select(); document.execCommand('copy'); alert('✅ 복사됨!'); });
  });
  document.getElementById('edSaveLocal').addEventListener('click', () => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(workGraph));
    alert('✅ 브라우저에 저장되었습니다!\n다음에 에디터를 열 때 자동으로 불러와요.');
  });
  document.getElementById('edExportClose').addEventListener('click', () => {
    exportBox.style.display='none'; overlay.style.display='none';
  });

  // 불러오기 팝업
  document.getElementById('edImportApply').addEventListener('click', importCode);
  document.getElementById('edImportClose').addEventListener('click', () => {
    importBox.style.display='none'; overlay.style.display='none';
  });

  // 미리보기 팝업
  document.getElementById('edPreviewRun').addEventListener('click', runPreview);
  document.getElementById('edPreviewClose').addEventListener('click', () => {
    document.getElementById('edPreviewPanel').classList.remove('active');
    renderAll();
  });
  document.getElementById('edPreviewFrom').addEventListener('keydown', e => { if(e.key==='Enter') runPreview(); });
  document.getElementById('edPreviewTo').addEventListener('keydown',   e => { if(e.key==='Enter') runPreview(); });

  overlay.addEventListener('click', e => {
    if (e.target===overlay) {
      exportBox.style.display='none';
      importBox.style.display='none';
      overlay.style.display='none';
      renderAll();
    }
  });

  // 리사이즈 대응
  // ── 화면 크기/회전 대응: 레이아웃 완료 후 재렌더 ──
  let resizeTimer = null;
  function deferredRender() {
    if (resizeTimer) clearTimeout(resizeTimer);
    // 브라우저 레이아웃 재계산이 끝날 때까지 대기 후 렌더
    resizeTimer = setTimeout(() => {
      renderAll();
      resizeTimer = null;
    }, 150);
  }

  window.addEventListener('resize', deferredRender);

  // 모바일 가로/세로 회전: orientationchange 후 레이아웃까지 시간이 더 걸림
  window.addEventListener('orientationchange', () => {
    if (resizeTimer) clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      renderAll();
      // 한 번 더 확인 (일부 기기는 500ms 후에야 완료)
      setTimeout(renderAll, 400);
      resizeTimer = null;
    }, 100);
  });

  mapImg.addEventListener('load', () => renderAll());

  // 초기 로드
  loadFloor(currentFloor);
})();
</script>
</body>
</html>
