<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉아산병원 안내지도 v15</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- 핵심 층 미리 로드 -->
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/99nBTF5r/1.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/SwCtCF4c/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/nqZHRSS8/3.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/v4kHJDPV/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/MxkY0q1f/3.png">

<style>
  :root {
    --mint:    #009688;
    --mint-light: #e0f2f1;
    --mint-mid: #4db6ac;
    --orange:  #ff8c42;
    --orange-light: #fff3eb;
    --orange-mid: #ffb380;
    --bg:      #f5f7f6;
    --card:    #ffffff;
    --text:    #2c3e35;
    --text-sub:#6b7c74;
    --border:  #dde8e5;
    --shadow:  0 4px 20px rgba(0,150,136,0.10);
    --radius:  14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px 80px;
    min-height: 100vh;
  }

  /* ── 헤더 ── */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }
  .header-logo {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .header-icon {
    width: 38px; height: 38px;
    background: var(--mint);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  h1 {
    color: var(--mint);
    font-weight: 700;
    font-size: 22px;
    letter-spacing: -0.3px;
  }
  .subtitle {
    color: var(--text-sub);
    font-size: 13.5px;
    margin-top: 2px;
  }

  /* ── 카드 ── */
  .card {
    max-width: 700px;
    width: 100%;
    margin: 0 auto 28px auto;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: visible;
  }

  /* ── 탭 ── */
  .tab-bar {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 14px 0;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    border: none;
    background: transparent;
    color: var(--text-sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border-bottom: 3px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    position: relative;
    top: 1px;
  }
  .tab-btn.active {
    color: var(--mint);
    border-bottom: 3px solid var(--mint);
  }
  .tab-btn:first-child { border-radius: var(--radius) 0 0 0; }
  .tab-btn:last-child  { border-radius: 0 var(--radius) 0 0; }

  /* ── 탭 패널 ── */
  .tab-panel {
    display: none;
    padding: 22px 20px 20px;
  }
  .tab-panel.active { display: block; }

  /* ── 라벨 + 입력 ── */
  .field-group { margin-bottom: 16px; }
  .field-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 7px;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field-label .lbl-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .lbl-icon.start-icon { background: #e8f5e9; }
  .lbl-icon.end-icon   { background: var(--orange-light); }
  .lbl-icon.search-icon{ background: var(--mint-light); }

  /* 입력 래퍼 (아이콘 + input) */
  .input-wrap {
    position: relative;
    width: 100%;
  }
  .input-prefix {
    position: absolute;
    top: 50%; left: 14px;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
    z-index: 2;
  }
  input[type="text"] {
    width: 100%;
    padding: 13px 14px 13px 42px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    background: #fafcfb;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    outline: none;
  }
  input[type="text"]:focus {
    border-color: var(--mint);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(0,150,136,0.12);
  }

  /* 경로 화살표 구분선 */
  .route-divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 4px 0 16px;
    color: var(--text-sub);
    font-size: 13px;
  }
  .route-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .route-arrow {
    width: 28px; height: 28px;
    background: var(--mint-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }

  /* ── 버튼 ── */
  .main-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    letter-spacing: -0.2px;
  }
  .btn-route {
    background: var(--orange);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,140,66,0.30);
  }
  .btn-route:hover  { background: #e67a30; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,140,66,0.35); }
  .btn-route:active { transform: translateY(0); box-shadow: none; }

  .btn-search {
    background: var(--orange);
    color: #fff;
    box-shadow: 0 4px 14px rgba(255,140,66,0.30);
  }
  .btn-search:hover  { background: #e67a30; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,140,66,0.35); }
  .btn-search:active { transform: translateY(0); box-shadow: none; }

  /* ── 자동완성 ── */
  .suggest-box {
    display: none;
    position: absolute;
    left: 0; right: 0;
    top: calc(100% + 6px);
    background: #fff;
    border: 1.5px solid var(--mint-mid);
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,150,136,0.15);
    padding: 8px;
    z-index: 100;
  }
  .suggest-header {
    font-size: 11px;
    font-weight: 700;
    color: var(--mint);
    padding: 4px 8px 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .suggest-list { max-height: 200px; overflow-y: auto; }
  .suggest-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .suggest-item:hover { background: var(--mint-light); }
  .suggest-item b { font-size: 14px; color: var(--text); font-weight: 600; }
  .suggest-item .suggest-floor {
    font-size: 11.5px;
    color: var(--mint);
    background: var(--mint-light);
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── 결과 영역 fade-in ── */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in {
    animation: fadeInUp 0.45s cubic-bezier(0.22, 0.61, 0.36, 1) both;
  }

  #mapsContainer {
    max-width: 700px;
    width: 100%;
    margin: 0 auto;
    display: none;
  }

  /* 결과 메시지 칩 */
  .result-chip {
    display: none;
    max-width: 700px;
    margin: 0 auto 18px auto;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--mint);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .result-chip.orange-accent { border-left-color: var(--orange); }
  .result-chip .chip-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--mint);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-chip.orange-accent .chip-title { color: var(--orange); }
  .result-chip .chip-body {
    font-size: 13.5px;
    color: var(--text-sub);
    line-height: 1.6;
    white-space: pre-line;
  }

  /* 지도 블록 */
  .map-block { margin-bottom: 24px; }
  .map-heading {
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 8px;
    width: fit-content;
  }
  .map-heading.current { color: #2e7d32; background: #e8f5e9; }
  .map-heading.dest    { color: #e65100; background: var(--orange-light); }

  .map-wrapper {
    position: relative;
    display: inline-block;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.14);
  }
  .floor-map {
    width: 100%;
    height: auto;
    display: block;
    cursor: zoom-in;
    transition: transform 0.2s;
  }
  .floor-map:hover { transform: scale(1.005); }

  /* 마커 */
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(255,140,66,0.5); }
    70%  { box-shadow: 0 0 0 12px rgba(255,140,66,0); }
    100% { box-shadow: 0 0 0 0   rgba(255,140,66,0); }
  }
  @keyframes pulseGreen {
    0%   { box-shadow: 0 0 0 0   rgba(76,175,80,0.5); }
    70%  { box-shadow: 0 0 0 12px rgba(76,175,80,0); }
    100% { box-shadow: 0 0 0 0   rgba(76,175,80,0); }
  }
  @keyframes pulseCopper {
    0%   { box-shadow: 0 0 0 0   rgba(184,115,51,0.5); }
    70%  { box-shadow: 0 0 0 10px rgba(184,115,51,0); }
    100% { box-shadow: 0 0 0 0   rgba(184,115,51,0); }
  }
  .marker {
    position: absolute;
    border-radius: 50%;
    z-index: 10;
    transform: translate(-50%,-50%);
  }
  .marker.start    { width:22px;height:22px;background:#4caf50;animation:pulseGreen 1.4s infinite; }
  .marker.end      { width:26px;height:26px;background:var(--orange);animation:pulse 1.4s infinite; }
  .marker.elevator { width:20px;height:20px;background:#b87333;animation:pulseCopper 1.4s infinite; }

  /* 확대 팝업 */
  #imagePopup {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    justify-content: center;
    align-items: center;
    z-index: 5000;
    backdrop-filter: blur(4px);
  }
  #popupInner {
    position: relative;
    max-width: 95%;
    max-height: 95%;
  }
  #popupClose {
    position: absolute;
    top: -44px; right: -10px;
    background: var(--orange);
    border: none;
    color: #fff;
    font-size: 20px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 700;
  }
  #popupImgWrap { position: relative; }
  #popupImg { max-width:100%;max-height:90vh;border-radius:12px;display:block; }
  #popupMarker { display:none;position:absolute;border-radius:50%;background:var(--orange);
    width:26px;height:26px;transform:translate(-50%,-50%);animation:pulse 1.4s infinite;z-index:5010; }

  /* 로딩 */
  #loadingOverlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9000;
    backdrop-filter: blur(3px);
  }
  #loadingBox {
    background: var(--card);
    border-radius: 14px;
    padding: 24px 28px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--mint-light);
    border-top-color: var(--mint);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingBox p { font-size: 14px; color: var(--text-sub); font-weight: 500; }

  /* 하단 안내 */
  .footer-note {
    text-align: center;
    padding: 28px 20px 0;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text-sub);
    max-width: 700px;
    margin: 0 auto;
  }
  .footer-note a { color: var(--mint); text-decoration: none; font-weight: 600; }

  /* 범례 */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0 auto 20px;
    max-width: 700px;
    padding: 0 4px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12.5px;
    color: var(--text-sub);
    font-weight: 500;
  }
  .legend-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── 입력창 X 버튼 ── */
  .clear-btn {
    position: absolute;
    top: 50%; right: 12px;
    transform: translateY(-50%);
    background: #c8d8d4;
    border: none;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    color: #fff;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    padding: 0;
    z-index: 3;
    transition: background 0.15s;
  }
  .clear-btn:hover { background: #999; }
  .clear-btn.visible { display: flex; }

  /* 입력창 오른쪽 여백 (X 버튼 공간) */
  .input-wrap input[type="text"] { padding-right: 40px; }

  /* ── 버튼 비활성화 ── */
  .main-btn:disabled {
    background: #c8d8d4 !important;
    box-shadow: none !important;
    cursor: not-allowed;
    transform: none !important;
    opacity: 0.7;
  }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-logo">
    <h1>강릉아산병원</h1>
  </div>
  <p class="subtitle">진료과 · 검사실 위치를 안내해 드립니다</p>
</div>

<!-- 검색 카드 -->
<div class="card">
  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('route')">
      🧭 경로 안내
    </button>
    <button class="tab-btn" onclick="switchTab('quick')">
      🔍 빠른 위치 찾기
    </button>
  </div>

  <!-- 탭 1 : 경로 안내 -->
  <div class="tab-panel active" id="panelRoute">

    <!-- 출발지 -->
    <div class="field-group">
      <label class="field-label">
        <span class="lbl-icon start-icon">🟢</span>
        출발지
      </label>
      <div class="input-wrap">
        <span class="input-prefix">📍</span>
        <input id="startInput" type="text"
          placeholder="예: 신경과, CT실"
          oninput="showSuggestions('start'); toggleClear('startInput','clearStart')"
          autocomplete="off"
          onkeydown="handleStartEnter(event)">
        <button class="clear-btn" id="clearStart" onclick="clearInput('startInput','clearStart','start')" tabindex="-1">✕</button>
        <div id="startSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="startSuggestList"></div>
        </div>
      </div>
    </div>

    <!-- 화살표 구분선 -->
    <div class="route-divider">
      <div class="route-divider-line"></div>
      <div class="route-arrow">↓</div>
      <div class="route-divider-line"></div>
    </div>

    <!-- 도착지 -->
    <div class="field-group">
      <label class="field-label">
        <span class="lbl-icon end-icon">🟠</span>
        도착지
      </label>
      <div class="input-wrap">
        <span class="input-prefix">🏁</span>
        <input id="endInput" type="text"
          placeholder="예: MRI실, 심장내과"
          oninput="showSuggestions('end'); toggleClear('endInput','clearEnd'); updateBtnState()"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') navigateRoute()">
        <button class="clear-btn" id="clearEnd" onclick="clearInput('endInput','clearEnd','end'); updateBtnState()" tabindex="-1">✕</button>
        <div id="endSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="endSuggestList"></div>
        </div>
      </div>
    </div>

    <button id="btnRoute" class="main-btn btn-route" onclick="navigateRoute()" disabled>
      🧭 경로 안내
    </button>
  </div>

  <!-- 탭 2 : 빠른 위치 찾기 -->
  <div class="tab-panel" id="panelQuick">
    <div class="field-group">
      <label class="field-label">
        <span class="lbl-icon search-icon">🔍</span>
        찾을 장소
      </label>
      <div class="input-wrap">
        <span class="input-prefix">🏥</span>
        <input id="searchInput" type="text"
          placeholder="예: 내분비내과, 초음파검사실"
          oninput="showSuggestions('search'); toggleClear('searchInput','clearSearch'); updateSearchBtnState()"
          autocomplete="off"
          onkeydown="if(event.key==='Enter') searchPlace()">
        <button class="clear-btn" id="clearSearch" onclick="clearInput('searchInput','clearSearch','search'); updateSearchBtnState()" tabindex="-1">✕</button>
        <div id="searchSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="searchSuggestList"></div>
        </div>
      </div>
    </div>

    <button id="btnSearch" class="main-btn btn-search" onclick="searchPlace()" disabled>
      🔍 위치 표시
    </button>
  </div>
</div>

<!-- 결과 메시지 칩 -->
<div id="resultChip" class="result-chip">
  <div class="chip-title" id="chipTitle">📍 위치 안내</div>
  <div class="chip-body" id="chipBody"></div>
</div>

<!-- 범례 (결과 표시 시 함께 노출) -->
<div id="legendBox" class="legend" style="display:none;">
  <div class="legend-item">
    <div class="legend-dot" style="background:#4caf50;"></div>출발지
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:var(--orange);"></div>도착지
  </div>
  <div class="legend-item">
    <div class="legend-dot" style="background:#b87333;"></div>엘리베이터
  </div>
</div>

<!-- 지도 영역 -->
<div id="mapsContainer">
  <div id="currentBlock" class="map-block">
    <div class="map-heading current">🟢 현재 위치 (출발층)</div>
    <div id="mapCurrent" class="map-wrapper">
      <img id="mapImageCurrent" class="floor-map" src="" alt="출발층 지도"
        loading="lazy" onclick="openImagePopup(this.src, 'start')">
    </div>
  </div>

  <div id="destBlock" class="map-block">
    <div class="map-heading dest">🟠 도착 위치 (도착층)</div>
    <div id="mapDestination" class="map-wrapper">
      <img id="mapImageDestination" class="floor-map" src="" alt="도착층 지도"
        loading="lazy" onclick="openImagePopup(this.src, 'end')">
    </div>
  </div>
</div>

<!-- 확대 팝업 -->
<div id="imagePopup" style="display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.88); z-index:5000; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);">
  <div id="popupInner" style="position:relative; max-width:95%; max-height:95%;">
    <button id="popupClose" onclick="closeImagePopup()"
      style="position:absolute; top:-44px; right:-10px; background:var(--orange);
      border:none; color:#fff; font-size:20px; padding:8px 14px; border-radius:8px;
      cursor:pointer; font-family:'Noto Sans KR',sans-serif; font-weight:700;">✕ 닫기</button>
    <div id="popupImgWrap" style="position:relative; max-width:100%;">

/* ── 출발지 엔터 → 도착지 포커스 ── */
function handleStartEnter(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('endInput').focus();
  }
}

/* ── 탭 전환 ── */
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

  if (tab === 'route') {
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('panelRoute').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('panelQuick').classList.add('active');
  }
  // 결과 초기화
  hideResults();
}

function hideResults() {
  mapsContainer.style.display = 'none';
  resultChip.style.display = 'none';
  legendBox.style.display = 'none';
}

/* ── 유틸 ── */
function norm(str) { return str.toLowerCase().replace(/\s+/g, ''); }

function resolveKey(raw) {
  if (!raw) return null;
  const lowered = raw.trim().toLowerCase();
  const aliased = aliases[lowered] ? aliases[lowered] : lowered;
  return Object.keys(positions).find(k => k.toLowerCase().includes(aliased)) || null;
}

/* ── 자동완성 ── */
function getSuggestions(query) {
  if (!query) return [];
  const q = norm(query);
  const aliasMatches = [];
  Object.keys(aliases).forEach(aKey => {
    if (norm(aKey).includes(q)) {
      const real = aliases[aKey];
      if (positions[real]) aliasMatches.push(real);
    }
  });
  const directMatches = Object.keys(positions).filter(k => norm(k).includes(q));
  const unique = [...new Set([...aliasMatches, ...directMatches])];
  return unique.slice(0, 6).map(name => ({ name, floor: positions[name].floor }));
}

/* 층 이미지 미리 로드 */
const preloadedFloors = new Set();
function preloadFloor(floorName) {
  if (preloadedFloors.has(floorName) || !maps[floorName]) return;
  preloadedFloors.add(floorName);
  const img = new Image();
  img.src = maps[floorName];
}

function fillSuggestions(listEl, boxEl, suggestions, targetInput) {
  listEl.innerHTML = '';
  if (!suggestions.length) { boxEl.style.display = 'none'; return; }
  suggestions.forEach(sug => {
    const div = document.createElement('div');
    div.className = 'suggest-item';
    div.innerHTML = `<b>${sug.name}</b><span class="suggest-floor">${sug.floor}</span>`;

    // 마우스/터치가 올라오는 순간 해당 층 이미지 미리 로드
    div.addEventListener('mouseenter', () => preloadFloor(sug.floor));
    div.addEventListener('touchstart', () => preloadFloor(sug.floor), {passive: true});

    div.onclick = () => {
      targetInput.value = sug.name;
      boxEl.style.display = 'none';
      // 선택 즉시 지도 표시
      if (targetInput === searchInput) {
        searchPlace();
      } else if (targetInput === endInput) {
        navigateRoute();
      } else if (targetInput === startInput) {
        if (endInput.value.trim()) navigateRoute();
      }
    };
    listEl.appendChild(div);
  });
  boxEl.style.display = 'block';
}

function showSuggestions(type) {
  if (type === 'start')  fillSuggestions(startSuggestList,  startSuggestBox,  getSuggestions(startInput.value),  startInput);
  if (type === 'end')    fillSuggestions(endSuggestList,    endSuggestBox,    getSuggestions(endInput.value),    endInput);
  if (type === 'search') fillSuggestions(searchSuggestList, searchSuggestBox, getSuggestions(searchInput.value), searchInput);
}

document.addEventListener('click', e => {
  if (!e.target.closest('#startSuggest')  && !e.target.closest('#startInput'))  startSuggestBox.style.display  = 'none';
  if (!e.target.closest('#endSuggest')    && !e.target.closest('#endInput'))    endSuggestBox.style.display    = 'none';
  if (!e.target.closest('#searchSuggest') && !e.target.closest('#searchInput')) searchSuggestBox.style.display = 'none';
});

/* ── 마커 ── */
function addMarker(wrapper, cls, top, left) {
  const m = document.createElement('div');
  m.className = 'marker ' + cls;
  m.style.top  = top;
  m.style.left = left;
  wrapper.appendChild(m);
}

/* ── 지도 세팅 ── */
function setupMap(wrapper, imgEl, floorName) {
  wrapper.querySelectorAll('.marker').forEach(n => n.remove());
  imgEl.src = maps[floorName];
  imgEl.dataset.floorName = floorName;
}

/* ── 로딩 ── */
function showLoading() { loadingOverlay.style.display = 'flex'; }
function hideLoading()  { loadingOverlay.style.display = 'none'; }

function waitImagesLoaded(imgEls, callback) {
  let remain = imgEls.filter(i => i && i.src).length || 1;
  const done = () => { if (--remain <= 0) callback(); };
  imgEls.forEach(imgEl => {
    if (!imgEl || !imgEl.src) return;
    imgEl.complete ? done() : (imgEl.onload = imgEl.onerror = done);
  });
}

/* ── fade-in 트리거 ── */
function triggerFadeIn(el) {
  el.classList.remove('fade-in');
  void el.offsetWidth; // reflow
  el.classList.add('fade-in');
}


/* ── X 버튼 토글 ── */
function toggleClear(inputId, btnId) {
  const inp = document.getElementById(inputId);
  const btn = document.getElementById(btnId);
  if (!btn) return;
  inp.value.trim() ? btn.classList.add('visible') : btn.classList.remove('visible');
}

function clearInput(inputId, btnId, suggestType) {
  const inp = document.getElementById(inputId);
  inp.value = '';
  toggleClear(inputId, btnId);
  showSuggestions(suggestType);
  inp.focus();
}

/* ── 버튼 비활성화 ── */
function updateBtnState() {
  const btn = document.getElementById('btnRoute');
  if (!btn) return;
  btn.disabled = !endInput.value.trim();
}

function updateSearchBtnState() {
  const btn = document.getElementById('btnSearch');
  if (!btn) return;
  btn.disabled = !searchInput.value.trim();
}

/* ── 자동 스크롤 ── */
function scrollToResult() {
  const target = document.getElementById('resultChip');
  if (!target) return;
  setTimeout(() => {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 120);
}

/* ── 결과 표시 공통 ── */
function showResult(titleText, bodyText, isOrange) {
  chipTitle.textContent = titleText;
  chipBody.textContent  = bodyText;
  resultChip.className  = 'result-chip' + (isOrange ? ' orange-accent' : '') + ' fade-in';
  resultChip.style.display = 'block';
  triggerFadeIn(resultChip);
  scrollToResult();
}

/* ── 빠른 위치 찾기 ── */
function searchPlace() {
  const raw = searchInput.value.trim();
  if (!raw) { showResult('⚠️ 안내', '검색어를 입력해주세요.', false); mapsContainer.style.display = 'none'; legendBox.style.display = 'none'; return; }

  const key = resolveKey(raw);
  if (!key)  { showResult('⚠️ 검색 결과 없음', '일치하는 장소를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.', false); mapsContainer.style.display = 'none'; legendBox.style.display = 'none'; return; }

  const dst = positions[key];
  showLoading();

  currentBlock.style.display = 'none';
  destBlock.style.display = 'block';
  mapsContainer.style.display = 'block';
  setupMap(mapDestWrap, mapImageDest, dst.floor);
  addMarker(mapDestWrap, 'end', dst.top, dst.left);

  showResult(`📍 ${dst.floor} · ${key}`, `주황색 점이 도착지 위치예요.\n지도를 탭하면 크게 볼 수 있어요 🔎`, true);
  legendBox.style.display = 'flex';

  waitImagesLoaded([mapImageDest], () => {
    hideLoading();
    triggerFadeIn(mapsContainer);
  });
}

/* ── 경로 안내 ── */
function navigateRoute() {
  const sVal = startInput.value.trim();
  const eVal = endInput.value.trim();

  if (!eVal) { showResult('⚠️ 안내', '도착지를 입력해주세요.', false); mapsContainer.style.display = 'none'; legendBox.style.display = 'none'; return; }

  const startKey = resolveKey(sVal);
  const endKey   = resolveKey(eVal);

  if (!endKey) { showResult('⚠️ 검색 결과 없음', '도착지를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.', false); mapsContainer.style.display = 'none'; legendBox.style.display = 'none'; return; }

  const src = startKey ? positions[startKey] : null;
  const dst = positions[endKey];
  const srcFloor = src ? src.floor : null;
  const dstFloor = dst.floor;

  showLoading();
  currentBlock.style.display = 'block';
  destBlock.style.display = 'block';
  mapsContainer.style.display = 'block';

  const currentFloor = srcFloor || dstFloor;
  setupMap(mapCurrentWrap, mapImageCurrent, currentFloor);
  setupMap(mapDestWrap,    mapImageDest,    dstFloor);

  if (src) addMarker(mapCurrentWrap, 'start', src.top, src.left);
  const elev = elevators[currentFloor];
  if (elev) addMarker(mapCurrentWrap, 'elevator', elev.top, elev.left);
  addMarker(mapDestWrap, 'end', dst.top, dst.left);

  const srcBuilding  = srcFloor ? (srcFloor.includes('본관') ? '본관' : '신관') : null;
  const dstBuilding  = dstFloor.includes('본관') ? '본관' : '신관';
  const sameBuilding = srcBuilding && srcBuilding === dstBuilding;
  const sameFloor    = srcFloor && srcFloor === dstFloor;

  let title = src ? `🧭 ${startKey} → ${endKey}` : `📍 ${endKey}`;
  let body  = '';
  if (!src) {
    body = `${dstFloor}에 위치해 있어요.\n주황색 점이 도착지예요. 지도를 탭하면 크게 볼 수 있어요 🔎`;
  } else if (sameBuilding && sameFloor) {
    body = `같은 층이에요! 바로 이동하시면 됩니다 🙂\n초록색 → 출발지 / 주황색 → 도착지`;
  } else if (sameBuilding && !sameFloor) {
    body = `같은 건물이지만 층이 달라요.\n${srcFloor} 엘리베이터(갈색 점)를 타고 ${dstFloor}으로 이동해주세요 🚪`;
  } else {
    body = `건물이 달라요.\n본관 ↔ 신관은 2층 또는 3층 연결통로를 이용하세요 🚶`;
  }

  showResult(title, body, false);
  legendBox.style.display = 'flex';

  waitImagesLoaded([mapImageCurrent, mapImageDest], () => {
    hideLoading();
    triggerFadeIn(mapsContainer);
  });
}

/* ── 이미지 팝업 ── */
function openImagePopup(src, type) {
  const pop    = document.getElementById('imagePopup');
  const img    = document.getElementById('popupImg');
  const marker = document.getElementById('popupMarker');

  img.src = src;

  const wrapper = (type === 'end') ? mapDestWrap : mapCurrentWrap;
  const destM   = wrapper.querySelector('.marker.end');
  if (destM) {
    marker.style.top   = destM.style.top;
    marker.style.left  = destM.style.left;
    marker.style.display = 'block';
  } else {
    marker.style.display = 'none';
  }
  pop.style.display = 'flex';
}

function closeImagePopup() {
  document.getElementById('imagePopup').style.display = 'none';
}

document.getElementById('imagePopup').addEventListener('click', e => {
  if (!document.getElementById('popupInner').contains(e.target)) closeImagePopup();
});

/* ── 관리자 모드 (Alt+M) ── */
let adminMode = false;
document.addEventListener('keydown', e => { if (e.altKey && e.key === 'm') toggleAdminMode(); });

function toggleAdminMode() {
  if (!adminMode) {
    if (prompt("관리자 비밀번호:") !== "gnah2025") { alert("비밀번호가 올바르지 않습니다."); return; }
    adminMode = true;
    alert("🛠️ 관리자 모드 활성화\n도착층 지도를 클릭하면 좌표를 얻을 수 있습니다.");
    mapDestWrap.addEventListener('click', handleAdminClick);
  } else {
    adminMode = false;
    alert("관리자 모드 종료");
    mapDestWrap.removeEventListener('click', handleAdminClick);
  }
}

function handleAdminClick(e) {
  if (!adminMode) return;
  const rect = mapImageDest.getBoundingClientRect();
  const xPct = ((e.clientX - rect.left) / rect.width  * 100).toFixed(1);
  const yPct = ((e.clientY - rect.top)  / rect.height * 100).toFixed(1);
  const floor = mapImageDest.dataset.floorName || '';
  const label = prompt(`이름 입력\n좌표: top:${yPct}%, left:${xPct}%\n층: ${floor}`);
  if (!label) return;
  positions[label] = { floor, top: yPct + '%', left: xPct + '%' };
  console.log("✅ 추가:", label, positions[label]);
  alert(`${floor} ${label} 추가 완료!`);
}

/* ── 사전 프리캐시 ── */
(function precache() {
  Object.values(maps).forEach(url => { const i = new Image(); i.src = url; });
})();
</script>
