<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강릉아산병원 안내지도 v15</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/99nBTF5r/1.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/SwCtCF4c/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/nqZHRSS8/3.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/v4kHJDPV/2.png">
<link rel="preload" as="image" href="https://i0.wp.com/i.ibb.co/MxkY0q1f/3.png">
<style>
  :root {
    --mint:#009688; --mint-light:#e0f2f1; --mint-mid:#4db6ac;
    --orange:#ff8c42; --orange-light:#fff3eb;
    --bg:#f5f7f6; --card:#ffffff; --text:#2c3e35; --text-sub:#6b7c74;
    --border:#dde8e5; --shadow:0 4px 20px rgba(0,150,136,0.10); --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);padding:32px 16px 80px;min-height:100vh;}

  /* 헤더 */
  .header{text-align:center;margin-bottom:28px;}
  h1{color:var(--mint);font-weight:700;font-size:22px;letter-spacing:-0.3px;}
  .subtitle{color:var(--text-sub);font-size:13.5px;margin-top:2px;}

  /* 카드 */
  .card{max-width:700px;width:100%;margin:0 auto 28px;background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);overflow:visible;}

  /* 탭 */
  .tab-bar{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border);}
  .tab-btn{padding:14px 0;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;border:none;background:transparent;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:3px solid transparent;transition:color .2s,border-color .2s;position:relative;top:1px;}
  .tab-btn.active{color:var(--mint);border-bottom:3px solid var(--mint);}
  .tab-btn:first-child{border-radius:var(--radius) 0 0 0;}
  .tab-btn:last-child{border-radius:0 var(--radius) 0 0;}
  .tab-panel{display:none;padding:22px 20px 20px;}
  .tab-panel.active{display:block;}

  /* 입력 */
  .field-group{margin-bottom:16px;}
  .field-label{font-size:13px;font-weight:600;color:var(--text-sub);margin-bottom:7px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px;}
  .lbl-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;}
  .lbl-icon.start-icon{background:#e8f5e9;} .lbl-icon.end-icon{background:var(--orange-light);} .lbl-icon.search-icon{background:var(--mint-light);}
  .input-wrap{position:relative;width:100%;}
  .input-prefix{position:absolute;top:50%;left:14px;transform:translateY(-50%);font-size:16px;pointer-events:none;z-index:2;}
  input[type="text"]{width:100%;padding:13px 40px 13px 42px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:#fafcfb;transition:border-color .2s,box-shadow .2s;outline:none;}
  input[type="text"]:focus{border-color:var(--mint);background:#fff;box-shadow:0 0 0 3px rgba(0,150,136,.12);}
  .route-divider{display:flex;align-items:center;gap:10px;margin:4px 0 16px;}
  .route-divider-line{flex:1;height:1px;background:var(--border);}
  .route-arrow{width:28px;height:28px;background:var(--mint-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}

  /* 버튼 */
  .main-btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:transform .15s,box-shadow .15s,background .15s;}
  .btn-route,.btn-search{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(255,140,66,.30);}
  .btn-route:hover,.btn-search:hover{background:#e67a30;transform:translateY(-1px);}
  .btn-route:active,.btn-search:active{transform:translateY(0);box-shadow:none;}
  .main-btn:disabled{background:#c8d8d4!important;box-shadow:none!important;cursor:not-allowed;transform:none!important;opacity:.7;}

  /* X 버튼 */
  .clear-btn{position:absolute;top:50%;right:12px;transform:translateY(-50%);background:#c8d8d4;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;padding:0;z-index:3;transition:background .15s;}
  .clear-btn:hover{background:#999;} .clear-btn.visible{display:flex;}

  /* 자동완성 */
  .suggest-box{display:none;position:absolute;left:0;right:0;top:calc(100% + 6px);background:#fff;border:1.5px solid var(--mint-mid);border-radius:12px;box-shadow:0 8px 24px rgba(0,150,136,.15);padding:8px;z-index:100;}
  .suggest-header{font-size:11px;font-weight:700;color:var(--mint);padding:4px 8px 8px;text-transform:uppercase;letter-spacing:.5px;}
  .suggest-list{max-height:200px;overflow-y:auto;}
  .suggest-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s;}
  .suggest-item:hover{background:var(--mint-light);}
  .suggest-item b{font-size:14px;color:var(--text);font-weight:600;}
  .suggest-floor{font-size:11.5px;color:var(--mint);background:var(--mint-light);padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}

  /* 결과 칩 */
  @keyframes fadeInUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeInUp .4s cubic-bezier(.22,.61,.36,1) both;}
  .result-chip{display:none;max-width:700px;margin:0 auto 20px;background:var(--card);border:1px solid var(--border);border-left:4px solid var(--mint);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);}
  .result-chip.orange-accent{border-left-color:var(--orange);}
  .chip-title{font-size:13px;font-weight:700;color:var(--mint);margin-bottom:4px;}
  .orange-accent .chip-title{color:var(--orange);}
  .chip-body{font-size:13.5px;color:var(--text-sub);line-height:1.6;white-space:pre-line;}

  /* 범례 */
  .legend{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin:0 auto 20px;max-width:700px;padding:0 4px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text-sub);font-weight:500;}
  .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}

  /* 지도 컨테이너 */
  #mapsContainer{max-width:700px;width:100%;margin:0 auto;display:none;}

  /* 단계 카드 */
  .step-block{margin-bottom:8px;}
  .step-heading{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px 14px;border-radius:10px;font-size:13.5px;font-weight:700;}
  .step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .step-heading.type-start{background:#e8f5e9;color:#2e7d32;} .step-heading.type-start .step-num{background:#4caf50;color:#fff;}
  .step-heading.type-mid{background:var(--mint-light);color:#00695c;} .step-heading.type-mid .step-num{background:var(--mint);color:#fff;}
  .step-heading.type-end{background:var(--orange-light);color:#e65100;} .step-heading.type-end .step-num{background:var(--orange);color:#fff;}
  .step-desc{font-size:12.5px;color:var(--text-sub);margin-bottom:10px;padding:0 4px;line-height:1.6;}

  /* 단계 사이 화살표 */
  .step-connector{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 0;font-size:12px;color:var(--text-sub);font-weight:600;}
  .step-connector-arrow{width:32px;height:32px;background:var(--mint-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--mint);flex-shrink:0;}

  /* 지도 */
  .map-wrapper{position:relative;width:100%;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.14);}
  .floor-map{width:100%;height:auto;display:block;cursor:zoom-in;transition:transform .2s;}
  .floor-map:hover{transform:scale(1.005);}

  /* 마커 — 핀 모양 (글자 가림 방지) */
  @keyframes pinFloat{
    0%,100%{ transform:translate(-50%,-100%) translateY(0); }
    50%    { transform:translate(-50%,-100%) translateY(-4px); }
  }
  .marker {
    position: absolute;
    z-index: 10;
    width: 24px;
    height: 30px;
    transform: translate(-50%, -100%);
    filter: drop-shadow(0 2px 5px rgba(0,0,0,0.30));
    animation: pinFloat 2s ease-in-out infinite;
  }
  /* 핀 머리 */
  .marker::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%) rotate(-45deg);
    transform-origin: center;
    width: 20px; height: 20px;
    border-radius: 50% 50% 50% 0;
    border: 2.5px solid rgba(255,255,255,0.85);
    box-shadow: inset 0 0 0 3px rgba(255,255,255,0.2);
  }
  /* 핀 꼬리 그림자 */
  .marker::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 4px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
  }
  .marker.start::before    { background: #43a047; }
  .marker.end::before      { background: var(--orange); }
  .marker.elevator::before { background: #a0714f; }
  .marker.connector::before{ background: #7c3aed; }

  /* 팝업 */
  #imagePopup{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:5000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  #popupInner{position:relative;max-width:95%;max-height:95%;}
  #popupClose{position:absolute;top:-44px;right:-10px;background:var(--orange);border:none;color:#fff;font-size:20px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;}
  #popupImg{max-width:100%;max-height:90vh;border-radius:12px;display:block;}

  /* 로딩 */
  #loadingOverlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(3px);}
  #loadingBox{background:var(--card);border-radius:14px;padding:24px 28px;text-align:center;}
  .spinner{width:36px;height:36px;border:3px solid var(--mint-light);border-top-color:var(--mint);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loadingBox p{font-size:14px;color:var(--text-sub);font-weight:500;}

  /* 하단 */
  .footer-note{text-align:center;padding:28px 20px 0;font-size:14px;line-height:1.8;color:var(--text-sub);max-width:700px;margin:0 auto;}
  .footer-note a{color:var(--mint);text-decoration:none;font-weight:600;}
</style>
</head>
<body>

<div class="header">
  <h1>강릉아산병원</h1>
  <p class="subtitle">진료과 · 검사실 위치를 안내해 드립니다</p>
</div>

<div class="card">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('route')">🧭 경로 안내</button>
    <button class="tab-btn" onclick="switchTab('quick')">🔍 빠른 위치 찾기</button>
  </div>

  <div class="tab-panel active" id="panelRoute">
    <div class="field-group">
      <label class="field-label"><span class="lbl-icon start-icon">🟢</span>출발지</label>
      <div class="input-wrap">
        <span class="input-prefix">📍</span>
        <input id="startInput" type="text" placeholder="예: 신경과, CT실"
          oninput="showSuggestions('start');toggleClear('startInput','clearStart')"
          autocomplete="off" onkeydown="handleStartEnter(event)">
        <button class="clear-btn" id="clearStart"
          onclick="clearInput('startInput','clearStart','start')" tabindex="-1">✕</button>
        <div id="startSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="startSuggestList"></div>
        </div>
      </div>
    </div>
    <div class="route-divider">
      <div class="route-divider-line"></div>
      <div class="route-arrow">↓</div>
      <div class="route-divider-line"></div>
    </div>
    <div class="field-group">
      <label class="field-label"><span class="lbl-icon end-icon">🟠</span>도착지</label>
      <div class="input-wrap">
        <span class="input-prefix">🏁</span>
        <input id="endInput" type="text" placeholder="예: MRI실, 심장내과"
          oninput="showSuggestions('end');toggleClear('endInput','clearEnd');updateBtnState()"
          autocomplete="off" onkeydown="if(event.key==='Enter')navigateRoute()">
        <button class="clear-btn" id="clearEnd"
          onclick="clearInput('endInput','clearEnd','end');updateBtnState()" tabindex="-1">✕</button>
        <div id="endSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="endSuggestList"></div>
        </div>
      </div>
    </div>
    <button id="btnRoute" class="main-btn btn-route" onclick="navigateRoute()" disabled>🧭 경로 안내</button>
  </div>

  <div class="tab-panel" id="panelQuick">
    <div class="field-group">
      <label class="field-label"><span class="lbl-icon search-icon">🔍</span>찾을 장소</label>
      <div class="input-wrap">
        <span class="input-prefix">🏥</span>
        <input id="searchInput" type="text" placeholder="예: 내분비내과, 초음파검사실"
          oninput="showSuggestions('search');toggleClear('searchInput','clearSearch');updateSearchBtnState()"
          autocomplete="off" onkeydown="if(event.key==='Enter')searchPlace()">
        <button class="clear-btn" id="clearSearch"
          onclick="clearInput('searchInput','clearSearch','search');updateSearchBtnState()" tabindex="-1">✕</button>
        <div id="searchSuggest" class="suggest-box">
          <div class="suggest-header">💡 검색 결과</div>
          <div class="suggest-list" id="searchSuggestList"></div>
        </div>
      </div>
    </div>
    <button id="btnSearch" class="main-btn btn-search" onclick="searchPlace()" disabled>🔍 위치 표시</button>
  </div>
</div>

<div id="resultChip" class="result-chip">
  <div class="chip-title" id="chipTitle"></div>
  <div class="chip-body"  id="chipBody"></div>
</div>

<div id="legendBox" class="legend" style="display:none;">
  <div class="legend-item"><div class="legend-dot" style="background:#4caf50"></div>출발지</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>도착지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b87333"></div>엘리베이터·에스컬레이터</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>연결통로</div>
</div>

<div id="mapsContainer"></div>

<div id="imagePopup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:5000;align-items:center;justify-content:center;backdrop-filter:blur(4px);">
  <div id="popupInner" style="position:relative;max-width:95%;max-height:95%;">
    <button id="popupClose" onclick="closeImagePopup()"
      style="position:absolute;top:-44px;right:-10px;background:var(--orange);border:none;color:#fff;font-size:20px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;">✕ 닫기</button>
    <img id="popupImg" src="" style="max-width:100%;max-height:90vh;border-radius:12px;display:block;">
  </div>
</div>

<div id="loadingOverlay">
  <div id="loadingBox">
    <div class="spinner"></div>
    <p>지도를 불러오는 중입니다…</p>
  </div>
</div>

<div class="footer-note">
  <p>😊 병원 안내 정보가 도움이 되셨나요?</p>
  <p>수정이 필요하거나 보완할 부분이 있다면<br>
  언제든지 <a href="mailto:t161930@gnah.co.kr">t161930@gnah.co.kr</a> 로 알려주세요.</p>
</div>

<script>

/* ── 탭 ── */
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  if(tab==='route'){
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('panelRoute').classList.add('active');
  } else {
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    document.getElementById('panelQuick').classList.add('active');
  }
  hideResults();
}

/* ── 유틸 ── */
function norm(s){return s.toLowerCase().replace(/\s+/g,'');}
function resolveKey(raw){
  if(!raw)return null;
  const low=raw.trim().toLowerCase();
  const ali=aliases[low]||low;
  return Object.keys(positions).find(k=>k.toLowerCase().includes(ali))||null;
}
function hideResults(){
  mapsContainer.style.display='none';
  mapsContainer.innerHTML='';
  resultChip.style.display='none';
  legendBox.style.display='none';
}
function showLoading(){loadingOverlay.style.display='flex';}
function hideLoading(){loadingOverlay.style.display='none';}
function triggerFadeIn(el){el.classList.remove('fade-in');void el.offsetWidth;el.classList.add('fade-in');}
function scrollToResult(){setTimeout(()=>resultChip.scrollIntoView({behavior:'smooth',block:'start'}),120);}
function showResult(title,body,isOrange){
  chipTitle.textContent=title;
  chipBody.textContent=body;
  resultChip.className='result-chip'+(isOrange?' orange-accent':'')+' fade-in';
  resultChip.style.display='block';
  triggerFadeIn(resultChip);
  scrollToResult();
}

/* ── 자동완성 ── */
function getSuggestions(query){
  if(!query)return[];
  const q=norm(query);
  const am=[];
  Object.keys(aliases).forEach(k=>{if(norm(k).includes(q)&&positions[aliases[k]])am.push(aliases[k]);});
  const dm=Object.keys(positions).filter(k=>norm(k).includes(q));
  return[...new Set([...am,...dm])].slice(0,6).map(n=>({name:n,floor:positions[n].floor}));
}
const preloadedFloors=new Set();
function preloadFloor(f){if(preloadedFloors.has(f)||!maps[f])return;preloadedFloors.add(f);new Image().src=maps[f];}
function fillSuggestions(listEl,boxEl,sugs,targetInput){
  listEl.innerHTML='';
  if(!sugs.length){boxEl.style.display='none';return;}
  sugs.forEach(s=>{
    const div=document.createElement('div');
    div.className='suggest-item';
    div.innerHTML=`<b>${s.name}</b><span class="suggest-floor">${s.floor}</span>`;
    div.addEventListener('mouseenter',()=>preloadFloor(s.floor));
    div.addEventListener('touchstart',()=>preloadFloor(s.floor),{passive:true});
    div.onclick=()=>{
      targetInput.value=s.name;
      boxEl.style.display='none';
      if(targetInput===searchInput)searchPlace();
      else if(targetInput===endInput)navigateRoute();
      else if(targetInput===startInput&&endInput.value.trim())navigateRoute();
    };
    listEl.appendChild(div);
  });
  boxEl.style.display='block';
}
function showSuggestions(type){
  if(type==='start')fillSuggestions(startSuggestList,startSuggestBox,getSuggestions(startInput.value),startInput);
  if(type==='end')fillSuggestions(endSuggestList,endSuggestBox,getSuggestions(endInput.value),endInput);
  if(type==='search')fillSuggestions(searchSuggestList,searchSuggestBox,getSuggestions(searchInput.value),searchInput);
}
document.addEventListener('click',e=>{
  if(!e.target.closest('#startSuggest')&&!e.target.closest('#startInput'))startSuggestBox.style.display='none';
  if(!e.target.closest('#endSuggest')&&!e.target.closest('#endInput'))endSuggestBox.style.display='none';
  if(!e.target.closest('#searchSuggest')&&!e.target.closest('#searchInput'))searchSuggestBox.style.display='none';
});

/* ── 지도 블록 생성 ── */
function createMapBlock(step, index, total){
  const typeClass = index===0?'type-start':(index===total-1?'type-end':'type-mid');
  const block=document.createElement('div');
  block.className='step-block fade-in';
  block.style.animationDelay=(index*0.1)+'s';

  // 헤딩
  const heading=document.createElement('div');
  heading.className='step-heading '+typeClass;
  heading.innerHTML=`<div class="step-num">${index+1}</div><div>${step.icon} ${step.floorLabel}</div>`;
  block.appendChild(heading);

  // 설명
  if(step.desc){
    const desc=document.createElement('div');
    desc.className='step-desc';
    desc.textContent=step.desc;
    block.appendChild(desc);
  }

  // 지도
  const wrapper=document.createElement('div');
  wrapper.className='map-wrapper';
  const img=document.createElement('img');
  img.className='floor-map';
  img.src=maps[step.floor];
  img.alt=step.floor+' 지도';
  img.loading='lazy';
  img.onclick=()=>openImagePopup(img.src);
  wrapper.appendChild(img);

  (step.markers||[]).forEach(m=>{
    const marker=document.createElement('div');
    marker.className='marker '+m.type;
    marker.style.top=m.pos.top;
    marker.style.left=m.pos.left;
    wrapper.appendChild(marker);
  });
  block.appendChild(wrapper);

  // 다음 단계 화살표
  if(index<total-1&&step.nextDesc){
    const conn=document.createElement('div');
    conn.className='step-connector';
    conn.innerHTML=`<div class="step-connector-arrow">↓</div><span>${step.nextDesc}</span>`;
    block.appendChild(conn);
  }
  return block;
}

/* ── 경로 단계 계산 ── */
/* 해당 층의 엘리베이터·에스컬레이터 마커 목록 반환 */
function getTransportMarkers(floor){
  const result=[];
  if(elevators[floor])  result.push({type:'elevator',pos:elevators[floor]});
  if(escalators[floor]) result.push({type:'elevator',pos:escalators[floor]});
  return result;
}

function getBridgeFloor(srcFloor,dstFloor){
  if(srcFloor.includes('3층')||dstFloor.includes('3층'))return'3층';
  return'2층';
}

function getRouteSteps(src,dst,srcFloor,dstFloor){
  const steps=[];
  const srcBuilding=srcFloor?(srcFloor.includes('본관')?'본관':'신관'):null;
  const dstBuilding=dstFloor.includes('본관')?'본관':'신관';
  const sameBuilding=srcBuilding&&srcBuilding===dstBuilding;
  const sameFloor=srcFloor&&srcFloor===dstFloor;

  /* 도착지만 */
  if(!src){
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      desc:'주황색 마커가 목적지예요.',
      markers:[{type:'end',pos:dst}]});
    return steps;
  }

  /* 같은 층 */
  if(sameFloor){
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      desc:'같은 층이에요! 초록색 → 출발지, 주황색 → 도착지',
      markers:[{type:'start',pos:src},{type:'end',pos:dst}]});
    return steps;
  }

  /* 같은 건물, 다른 층 */
  if(sameBuilding){
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      desc:'갈색 마커(엘리베이터·에스컬레이터)를 이용해 '+dstFloor+'으로 이동하세요.',
      markers:[{type:'start',pos:src},...getTransportMarkers(srcFloor)],
      nextDesc:'엘리베이터·에스컬레이터 탑승 → '+dstFloor});
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      desc:'주황색 마커가 목적지예요.',
      markers:[{type:'end',pos:dst}]});
    return steps;
  }

  /* 다른 건물 */
  const bl=getBridgeFloor(srcFloor,dstFloor);
  const srcBridge=srcBuilding+' '+bl;
  const dstBridge=dstBuilding+' '+bl;

  if(srcFloor===srcBridge){
    /* 출발층 = 연결통로 층 */
    const conn=connectors[srcBridge];
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      desc:'민트색 마커(연결통로)를 통해 '+dstBuilding+'으로 이동하세요.',
      markers:[{type:'start',pos:src},...(conn?[{type:'connector',pos:conn}]:[])],
      nextDesc:bl+' 연결통로 → '+dstBuilding+'으로 이동'});
  } else {
    /* 엘리베이터 타고 연결통로 층으로 */
    steps.push({floor:srcFloor,floorLabel:srcFloor,icon:'🟢',
      desc:'먼저 갈색 마커(엘리베이터·에스컬레이터)를 타고 '+srcBridge+'으로 이동하세요.',
      markers:[{type:'start',pos:src},...getTransportMarkers(srcFloor)],
      nextDesc:'엘리베이터 탑승 → '+srcBridge});
    const conn=connectors[srcBridge];
    steps.push({floor:srcBridge,floorLabel:srcBridge,icon:'🔀',
      desc:'민트색 마커(연결통로)를 통해 '+dstBuilding+'으로 이동하세요.',
      markers:[...(conn?[{type:'connector',pos:conn}]:[])],
      nextDesc:bl+' 연결통로 → '+dstBuilding+'으로 이동'});
  }

  if(dstFloor===dstBridge){
    /* 도착층 = 연결통로 층 */
    const conn=connectors[dstBridge];
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      desc:'연결통로로 진입 후 주황색 마커 방향으로 이동하세요.',
      markers:[...(conn?[{type:'connector',pos:conn}]:[]),{type:'end',pos:dst}]});
  } else {
    /* 연결통로 진입 후 엘리베이터 필요 */
    const conn=connectors[dstBridge];
    steps.push({floor:dstBridge,floorLabel:dstBridge,icon:'🔀',
      desc:'연결통로로 진입 후 갈색 마커(엘리베이터·에스컬레이터)를 타고 '+dstFloor+'으로 이동하세요.',
      markers:[...(conn?[{type:'connector',pos:conn}]:[]),...getTransportMarkers(dstBridge)],
      nextDesc:'엘리베이터 탑승 → '+dstFloor});
    steps.push({floor:dstFloor,floorLabel:dstFloor,icon:'🟠',
      desc:'주황색 마커가 목적지예요.',
      markers:[{type:'end',pos:dst}]});
  }

  return steps;
}

/* ── 렌더링 ── */
function renderSteps(steps){
  mapsContainer.innerHTML='';
  mapsContainer.style.display='block';
  steps.forEach((step,i)=>mapsContainer.appendChild(createMapBlock(step,i,steps.length)));
}

/* ── 빠른 위치 찾기 ── */
function searchPlace(){
  const raw=searchInput.value.trim();
  if(!raw){showResult('⚠️ 안내','검색어를 입력해주세요.',false);hideResults();return;}
  const key=resolveKey(raw);
  if(!key){showResult('⚠️ 검색 결과 없음','일치하는 장소를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.',false);hideResults();return;}
  const dst=positions[key];
  showResult(`📍 ${dst.floor} · ${key}`,'주황색 점이 도착지 위치예요.\n지도를 탭하면 크게 볼 수 있어요 🔎',true);
  legendBox.style.display='flex';
  renderSteps([{floor:dst.floor,floorLabel:dst.floor,icon:'🟠',
    desc:'주황색 마커가 목적지예요.',markers:[{type:'end',pos:dst}]}]);
  triggerFadeIn(mapsContainer);
}

/* ── 경로 안내 ── */
function navigateRoute(){
  const sVal=startInput.value.trim();
  const eVal=endInput.value.trim();
  if(!eVal){showResult('⚠️ 안내','도착지를 입력해주세요.',false);hideResults();return;}
  const startKey=resolveKey(sVal);
  const endKey=resolveKey(eVal);
  if(!endKey){showResult('⚠️ 검색 결과 없음','도착지를 찾을 수 없습니다.\n정확한 진료과 또는 검사실 이름을 입력해주세요.',false);hideResults();return;}

  const src=startKey?positions[startKey]:null;
  const dst=positions[endKey];
  const srcFloor=src?src.floor:null;
  const dstFloor=dst.floor;
  const srcBuilding=srcFloor?(srcFloor.includes('본관')?'본관':'신관'):null;
  const dstBuilding=dstFloor.includes('본관')?'본관':'신관';
  const sameBuilding=srcBuilding&&srcBuilding===dstBuilding;
  const sameFloor=srcFloor&&srcFloor===dstFloor;

  let title=src?`🧭 ${startKey} → ${endKey}`:`📍 ${endKey}`;
  let body='';
  if(!src) body=`${dstFloor}에 위치해 있어요.`;
  else if(sameFloor) body='같은 층이에요! 바로 이동하시면 됩니다 🙂';
  else if(sameBuilding) body=`같은 건물 · 다른 층\n엘리베이터를 이용해 ${dstFloor}으로 이동해주세요 🚪`;
  else {
    const bl=getBridgeFloor(srcFloor,dstFloor);
    body=`본관 ↔ 신관 ${bl} 연결통로를 이용하는 경로예요 🚶\n아래 단계를 순서대로 따라가세요.`;
  }

  showResult(title,body,false);
  legendBox.style.display='flex';

  const steps=getRouteSteps(src,dst,srcFloor,dstFloor);
  renderSteps(steps);
  triggerFadeIn(mapsContainer);
}

let adminMode=false;
document.addEventListener('keydown',e=>{if(e.altKey&&e.key==='m')toggleAdminMode();});
function toggleAdminMode(){
  if(!adminMode){
    if(prompt('관리자 비밀번호:')!=='gnah2025'){alert('비밀번호가 올바르지 않습니다.');return;}
    adminMode=true;
    alert('🛠️ 관리자 모드 활성화\n지도를 클릭하면 좌표를 얻을 수 있습니다.');
    document.addEventListener('click',handleAdminClick);
  } else {
    adminMode=false;alert('관리자 모드 종료');
    document.removeEventListener('click',handleAdminClick);
  }
}
function handleAdminClick(e){
  if(!adminMode)return;
  const img=e.target.closest('.floor-map');
  if(!img)return;
  const rect=img.getBoundingClientRect();
  const x=((e.clientX-rect.left)/rect.width*100).toFixed(1);
  const y=((e.clientY-rect.top)/rect.height*100).toFixed(1);
  const floor=img.alt.replace(' 지도','');
  const label=prompt(`이름 입력\n좌표: top:${y}%, left:${x}%\n층: ${floor}`);
  if(!label)return;
  positions[label]={floor,top:y+'%',left:x+'%'};
  alert(`${floor} · ${label} 추가 완료!`);
}

/* 프리캐시 */
(function(){Object.values(maps).forEach(url=>{new Image().src=url;});})();
